<!doctype html><html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Post-Midterm Double Quiz</title><style>
:root{--bg:#0f172a;--card:#111827;--card2:#1f2937;--text:#f8fafc;--muted:#94a3b8;--blue:#3b82f6;--green:#166534;--red:#7f1d1d;--border:#334155}*{box-sizing:border-box}body{margin:0;font-family:Arial,Helvetica,sans-serif;background:linear-gradient(#0f172a,#111827);color:var(--text)}.wrap{max-width:920px;margin:auto;padding:18px}header{position:sticky;top:0;z-index:10;background:rgba(15,23,42,.96);border-bottom:1px solid var(--border);backdrop-filter:blur(8px)}h1{margin:0 0 6px;font-size:1.45rem}.meta{color:var(--muted);font-size:.92rem}.controls{display:flex;gap:10px;flex-wrap:wrap;align-items:center;margin-top:12px}.ctrl{border:0;border-radius:10px;padding:10px 14px;font-weight:700;cursor:pointer}.primary{background:var(--blue);color:white}.secondary{background:#334155;color:white}.score{margin-left:auto;font-weight:700}.card{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:16px;margin:16px 0}.qnum{font-size:.85rem;color:#60a5fa;font-weight:700}.question{font-size:1.05rem;line-height:1.45;margin:9px 0 12px}.choice{width:100%;display:block;text-align:left;padding:12px;margin:8px 0;border-radius:10px;border:1px solid #475569;background:var(--card2);color:white;cursor:pointer}.choice.selected{outline:2px solid var(--blue)}.choice.correct{background:var(--green);border-color:#22c55e}.choice.wrong{background:var(--red);border-color:#ef4444}#result{display:none;background:#172554;border:1px solid #1d4ed8;border-radius:12px;padding:14px;margin-top:16px;font-weight:700}@media(max-width:600px){.score{width:100%;margin-left:0}}</style></head><body><header><div class="wrap"><h1>Post-Midterm Double Quiz</h1><div class="meta">27 questions total • Quiz 1 + Quiz 2</div><div class="controls"><button class="ctrl primary" id="gradeBtn">Grade Quiz</button><button class="ctrl secondary" id="resetBtn">Retake</button><label><input type="checkbox" id="studyMode"> Study mode</label><div class="score" id="scoreText">Score: —</div></div></div></header><main class="wrap"><div id="result"></div><div id="quiz"></div></main><script>
const QUESTIONS=[{"q": "What is the backup infrastructure for Windows Server 2008 as well as a mechanism for creating consistent point-in-time data copies known as ..", "options": ["Windows Server Backup", "Shadow Copies", "Bare Metal Recovery", "System State Backup"], "answer": 1}, {"q": "Why is using EMS (Exchange management shell) to repair a mailbox used over the ISendTech.exe", "options": ["it repairs only public folders", "you don't need to dismount the mailbox database to repair", "it requires the mailbox database to be dismounted", "it can only repair an offline database"], "answer": 1}, {"q": "What recovery method is used when it is critical for users to regain messaging functionality quickly after a mailbox server or database fails and when you cannot restore historical data from a backup quickly enough?", "options": ["Bare metal recovery", "Point-in-time recovery", "Database portability", "Dial tone recovery"], "answer": 3}, {"q": "Which type of recovery enables the mailbox database on the same server or on an alternate server to provide temporary access to email services?", "options": ["Mailbox export recovery", "Dial tone recovery", "Shadow copy recovery", "Server rebuild recovery"], "answer": 1}, {"q": "Which recovery option involves performing a new installation of Windows Server and Exchange Server 2010 in Recover Server Mode which gathers the previous settings from ADDS and you can then restore your Exchange Server databases?", "options": ["Restore the Mailbox", "Recover the Database", "Rebuild the Server", "Activate the Passive Copy"], "answer": 2}, {"q": "What type of downtime catastrophe such as flood, fire or earthquake cause?", "options": ["Routine servicing", "Planned maintenance", "Unplanned downtime", "Scheduled switchover"], "answer": 2}, {"q": "What component of active manager in ADAC ? controls which copies will be active and which will be passive and is responsible for processing topology, change notification and reacting to server failures?", "options": ["Replication Service", "DAG Witness Server", "SAM (Standby Active Manager)", "PAM (Primary Active Manager)"], "answer": 3}, {"q": "Which of the additional settings for a large or multi-site is not included in a DAG network?", "options": ["Relay", "Replication", "Subnet", "MAPI"], "answer": 0}, {"q": "Only holds email that has been delivered so where is the pending email held at?", "options": ["Transport Dumpster", "Recoverable Items Folder", "Mailbox Database", "Local Submission Queue"], "answer": 3}, {"q": "Which technology provides high-availability for the CAS role?", "options": ["DAG", "Shadow Redundancy", "Single Copy Cluster", "NLB (Network Load Balancing)"], "answer": 3}, {"q": "With Exchange Server 2010 SP1 or newer ____ provides an additional level of protection when receiving messages from a non-exchange 2010 SMTP server?", "options": ["Transport Dumpster", "Shadow Redundancy promotion", "Database Portability", "Safety Net"], "answer": 1}, {"q": "When creating multiple site DAGs use the ____ mode for DAGs that span multiple locations.", "options": ["Data Center Activation Coordination", "Database Availability Coordination", "Network Load Balancing", "Continuous Replication Circular Logging"], "answer": 0}, {"q": "What is the main difference between failover and a switchover?", "options": ["Failover is automatic and switchover is manual", "Both are manual", "Both are automatic", "Failover is manual and switchover is automatic"], "answer": 0}, {"q": "How many active and passive databases can each mailbox in Exchange 2010 host?", "options": ["50", "64", "128", "100"], "answer": 3}, {"q": "Where are transport rules on the Edge Transport Server stored?", "options": ["Exchange Mailbox Database", "AD LDS", "AD DS", "Windows Registry"], "answer": 1}, {"q": "What is used to set rules and settings that are applied to messages that pass through the Exchange Server transport component to restrict message flow or modify message content based on organizational requirements?", "options": ["Transport policies rules and settings (River city)", "Mailbox policies", "Retention policies", "Address book policies"], "answer": 0}, {"q": "What exchange server 2010 feature enables you to preserve almost all Mailbox items from both the primary mailbox and personal archive even if the user deletes something and you can perform discovery searches on these items too?", "options": ["Retention Tag", "Legal Hold", "Mailbox Audit Logging", "Archive Quota"], "answer": 1}, {"q": "How can retention policies be applied", "options": ["both A and B", "Only manually", "Only through transport rules", "Only automatically"], "answer": 0}, {"q": "Which assignment policy is an object in Exchange Server 2010 where users are associated with role assignment policy when you create their mailbox or change their role assignment policy on their mailboxes?", "options": ["Mailbox Policy", "Management Role Assignment Policy", "Address Book Policy", "Transport Rule Policy"], "answer": 1}, {"q": "What new permission model does Exchange 2010 use to eliminate the need to modify and manage ACLs on Exchange or AD DS objects", "options": ["Role Based (RBAC)", "NTFS inheritance", "UAC", "DAC"], "answer": 0}, {"q": "What option is available for client access to the internet that enables users to connect to the required virtual directories and services on the CAS and provide access to an SMTP server for IMAP4 and POP3 clients?", "options": ["DAG Configuration", "Firewall Configuration", "Transport Dumpster", "Mailbox Replication"], "answer": 1}, {"q": "Which policies are rules and settings that enables you to save acopy of all messages that meet specific criteria, for example, you can Journal messages sent by a particular user or messages sent to a particular Distro Group?", "options": ["Journaling Policies", "Retention Policies", "Address Policies", "Transport Policies"], "answer": 0}, {"q": "What component is a AD RMS prerequisite and is used to store and group users within AD RMS", "options": ["DHCP", "AD LDS", "AD DS", "DNS"], "answer": 2}, {"q": "Which journaling rules with this scope processes messages sent and received by recipients inside the organization?", "options": ["External", "Global", "Recipient-only", "Internal"], "answer": 3}, {"q": "When an archive mailbox exceeds is specified archive warning quota, a warning event is logged in the ___ log.", "options": ["Security event", "Setup event", "System event", "Application event"], "answer": 3}, {"q": "All the following Exchange Server Admin tools can use RBAC to determine user permission except:", "options": ["Exchange Control Panel", "Exchange Management Shell", "Exchange Trusted Subsystem", "Exchange Management Console"], "answer": 2}, {"q": "You automatically implement web features when you publish Outlook WebApp and Outlook Anywhere, Outlook Webapp automatically select a rule using cookie based ___.", "options": ["Redirection", "Load balancing", "Authentication", "Compression"], "answer": 1}];let state=[];function resetQuiz(){state=QUESTIONS.map(()=>({selected:null,revealed:false}));document.getElementById('scoreText').textContent='Score: —';document.getElementById('result').style.display='none';render();}function render(){const root=document.getElementById('quiz');root.innerHTML='';QUESTIONS.forEach((q,qi)=>{const card=document.createElement('section');card.className='card';card.innerHTML=`<div class="qnum">Question ${qi+1}</div><div class="question">${escapeHtml(q.q)}</div>`;q.options.forEach((opt,oi)=>{const b=document.createElement('button');b.type='button';b.className='choice';b.textContent=String.fromCharCode(65+oi)+'. '+opt;if(state[qi].selected===oi)b.classList.add('selected');if(state[qi].revealed){if(oi===q.answer)b.classList.add('correct');else if(state[qi].selected===oi)b.classList.add('wrong');}b.onclick=()=>{state[qi].selected=oi;if(document.getElementById('studyMode').checked)state[qi].revealed=true;render();};card.appendChild(b);});root.appendChild(card);});}function grade(){let correct=0;state.forEach((s,i)=>{if(s.selected===QUESTIONS[i].answer)correct++;s.revealed=true;});const pct=Math.round(correct/QUESTIONS.length*100);document.getElementById('scoreText').textContent=`Score: ${correct}/${QUESTIONS.length} (${pct}%)`;const r=document.getElementById('result');r.textContent=`You answered ${correct} of ${QUESTIONS.length} correctly.`;r.style.display='block';render();window.scrollTo({top:0,behavior:'smooth'});}function escapeHtml(s){return s.replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#039;'}[m]));}document.getElementById('gradeBtn').onclick=grade;document.getElementById('resetBtn').onclick=resetQuiz;document.getElementById('studyMode').onchange=()=>{state.forEach(s=>s.revealed=false);document.getElementById('scoreText').textContent='Score: —';document.getElementById('result').style.display='none';render();};resetQuiz();
</script></body></html>
