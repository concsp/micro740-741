<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Exchange 2010 Back-to-Back Quiz</title>
<style>
:root{--bg:#0f172a;--panel:#111827;--panel2:#1f2937;--text:#f8fafc;--muted:#94a3b8;--accent:#3b82f6;--good:#16a34a;--bad:#dc2626;--border:#334155}
*{box-sizing:border-box}body{margin:0;font-family:Arial,Helvetica,sans-serif;background:linear-gradient(180deg,#0f172a,#111827);color:var(--text)}.wrap{max-width:920px;margin:auto;padding:20px}header{position:sticky;top:0;z-index:10;background:rgba(15,23,42,.96);backdrop-filter:blur(8px);border-bottom:1px solid var(--border);padding:14px 0}h1{font-size:1.45rem;margin:0 0 6px}.sub{color:var(--muted);font-size:.92rem}.controls{display:flex;gap:10px;flex-wrap:wrap;margin-top:12px}button{border:0;border-radius:10px;padding:10px 14px;font-weight:700;cursor:pointer}.primary{background:var(--accent);color:white}.secondary{background:#334155;color:white}.toggle{display:flex;align-items:center;gap:8px;background:#1e293b;padding:9px 12px;border-radius:10px}.score{margin-left:auto;font-weight:700}.card{background:var(--panel);border:1px solid var(--border);border-radius:14px;padding:16px;margin:16px 0;box-shadow:0 8px 24px rgba(0,0,0,.18)}.qnum{color:#60a5fa;font-size:.85rem;font-weight:700;margin-bottom:8px}.question{font-size:1.05rem;line-height:1.45;margin-bottom:12px}.choice{display:block;width:100%;text-align:left;background:var(--panel2);color:var(--text);border:1px solid var(--border);padding:12px;margin:8px 0;border-radius:10px}.choice:hover{border-color:#64748b}.choice.selected{outline:2px solid var(--accent)}.choice.correct{background:rgba(22,163,74,.22);border-color:var(--good)}.choice.wrong{background:rgba(220,38,38,.22);border-color:var(--bad)}.note{color:var(--muted);font-size:.85rem;margin-top:8px}.result{display:none;background:#172554;border:1px solid #1d4ed8;border-radius:12px;padding:14px;margin:18px 0;font-weight:700}@media(max-width:600px){.score{width:100%;margin-left:0}.wrap{padding:14px}.card{padding:14px}}
</style>
</head>
<body>
<header><div class="wrap"><h1>Exchange 2010 Back-to-Back Quiz</h1><div class="sub">30 questions • Quiz 1 + Quiz 2</div><div class="controls"><button class="primary" id="gradeBtn">Grade Quiz</button><button class="secondary" id="resetBtn">Retake</button><label class="toggle"><input type="checkbox" id="studyMode"> Study mode</label><div class="score" id="scoreText">Score: —</div></div></div></header>
<main class="wrap"><div class="result" id="result"></div><div id="quiz"></div></main>
<script>
const SOURCE = [
{q:"Which security feature limits any server that can be accessed physically?",options:["Restrict physical access","Enable remote desktop","Configure mailbox quotas","Use transport rules"],correct:[0]},
{q:"In each of the sites where an Exchange 2010 server is deployed, at least one global catalog server must be installed and run _____ or newer?",options:["Windows Server 2003 Service Pack (SP) 1","Windows Server 2000 Service Pack 4","Windows Server 2008 R2 only","Windows Server 2012"],correct:[0]},
{q:"The following are all Server Roles in Exchange 2010 except:",options:["Active Directory Role","Mailbox Server Role","Hub Transport Server Role","Client Access Server Role"],correct:[0]},
{q:"Which role will not be installed using the typical Exchange Server installation?",options:["Edge Transport Server Role","Mailbox Server Role","Hub Transport Server Role","Client Access Server Role"],correct:[0]},
{q:"Which record is a resource record that allows Server to locate other servers to deliver Internet Email by using the SMTP?",options:["MX records","A records","PTR records","CNAME records"],correct:[0]},
{q:"A collection of disks that have no redundancy or fault tolerance is called what?",options:["JBOD","RAID 1","RAID 5","DAG"],correct:[0]},
{q:"What does Windows PowerShell use to perform a specific task?",options:["cmdlets","snapshots","mailboxes","connectors"],correct:[0]},
{q:"Which statement is considered a best practice for Public Folder Deployment?",options:["In cases of limited bandwidth, schedule Public Folder Replication during non-peak hours","Disable all Public Folder replication","Schedule replication only during peak hours","Store all public folders on the Edge Transport server"],correct:[0]},
{q:"Which component holds a copy of the local domain database that includes User Accounts and Computer Accounts?",options:["Global Catalog","Client Access Server","Mailbox Database","Edge Subscription"],correct:[0]},
{q:"In the Exchange Management Console (EMC), the node that contains the configuration option for each Exchange Server in the organization is the ___.",options:["Server Configuration","Recipient Configuration","Organization Configuration","Toolbox"],correct:[0]},
{q:"What separates the verb and noun pair of all Shell cmdlets?",options:["Hyphen / Separator","Colon","Forward slash","Underscore"],correct:[0]},
{q:"Which PowerShell version does the EMC and EMS (Exc Mgmt Shell) run on top of Windows?",options:["PowerShell version 2.0","PowerShell version 1.0","PowerShell version 3.0","PowerShell version 5.1"],correct:[0]},
{q:"Which new web-enabled feature in Exchange 2010 can be used by Exchange administrators to manage many Exchange organizational and recipient settings?",options:["Exchange Control Panel","Exchange ActiveSync","Outlook Anywhere","Windows Admin Center"],correct:[0]},
{q:"File Extension that we talked about?",options:[".edb",".pst",".ost",".xml"],correct:[0]},
{q:"There are two ways to configure an offline address book, either with Public Folder or ____.",options:["HTTP","SMTP","POP3","MAPI"],correct:[0]},
{q:"A ____ is outside the Exchange Server organization that has an external email address but also has AD logon credentials and can access resources?",options:["Mail Users","Mail Contacts","Distribution Groups","Room Mailboxes"],correct:[0]},
{q:"Which value is not one of the three values for automated processing?",options:["AUTO","AutoAccept","AutoUpdate","None"],correct:[0]},
{q:"Which mail-enabled group can only be assigned Exchange Server permissions for things such as Public Folders?",options:["Distribution Groups","Dynamic Distribution Groups","Mail Contacts","Mail Users"],correct:[0]},
{q:"Which SMTP email address variables would you use to specify alternate values to sailor.john.b@navy.com?",options:["%S","%G","%I","%D","%M"],correct:[0,1,2],multi:true},
{q:"How often does the offline address book generate in a day?",options:["1","2","4","24"],correct:[0]},
{q:"For relatively simple tasks, ___ output from one cmdlet to another to perform bulk management tasks?",options:["Pipe","Export","Clone","Redirect"],correct:[0]},
{q:"Which cmdlet gathers a list of groups from ADDS?",options:["Get-ADGroup","Get-Mailbox","Get-DistributionGroupMember","Get-ADUser"],correct:[0]},
{q:"The Microsoft Exchange file distribution service runs on what Server?",options:["CAS (Client Access Server)","Mailbox Server","Edge Transport Server","Hub Transport Server"],correct:[0]},
{q:"What does the CAS (Client Access Server) use to connect to Microsoft Active Directory Domain Services (ADDS) Domain Controller to authenticate the user?",options:["Kerberos","NTLM only","Basic authentication","OAuth"],correct:[0]},
{q:"By default, the Outlook Web App Virtual Directory is configured to use what type of authentication?",options:["Form-based authentication","Digest authentication","Certificate authentication","Anonymous authentication"],correct:[0]},
{q:"Which authentication transmits password in clear-text over the network, therefore you should always secure it by using SSL encryption?",options:["Basic authentication","Kerberos authentication","Integrated Windows authentication","Digest authentication"],correct:[0]},
{q:"For clients to connect to the CAS (Client Access Server) using SSL without receiving an error message, the names on the certificate must match the names that the client uses to ___?",options:["connect to the server","send email externally","join the domain","mount the mailbox database"],correct:[0]},
{q:"By default, Exchange Server 2010 supports POP3 and IMAP4 client connections but the services are set to start ___; if you want to enable user-access for these protocols you must start the services and configure them to start ___.",options:["Manually / automatically","Automatically / manually","Disabled / manually","Automatically / disabled"],correct:[0]},
{q:"When is the only time that a client connects to the Mailbox server directly in Exchange Server 2010?",options:["When accessing Public Folders","When using Outlook Web App","When using ActiveSync","When sending outbound SMTP mail"],correct:[0]},
{q:"With ___ technology the mobile device maintains a constant HTTPS connection to the CAS (Client Access Server), resulting in instant message retrieval and real-time access to email.",options:["Direct Push","Outlook Anywhere","RPC over HTTP","Autodiscover"],correct:[0]}
];
let state=[];
function shuffle(a){a=[...a];for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]]}return a}
function initialize(){state=SOURCE.map(q=>({q,choices:shuffle(q.options.map((text,original)=>({text,original,isCorrect:q.correct.includes(original)}))),selected:new Set(),revealed:false}));scoreText.textContent='Score: —';result.style.display='none';render()}
function render(){quiz.innerHTML='';state.forEach((item,qi)=>{const card=document.createElement('section');card.className='card';const multi=item.q.multi===true;card.innerHTML=`<div class="qnum">Question ${qi+1}${multi?' • Select 3 answers':''}</div><div class="question">${escapeHtml(item.q.q)}</div>`;item.choices.forEach((choice,ci)=>{const btn=document.createElement('button');btn.className='choice';btn.type='button';btn.textContent=String.fromCharCode(65+ci)+'. '+choice.text;if(item.selected.has(ci))btn.classList.add('selected');if(item.revealed){if(choice.isCorrect)btn.classList.add('correct');else if(item.selected.has(ci))btn.classList.add('wrong')}btn.onclick=()=>selectChoice(qi,ci);card.appendChild(btn)});if(multi){const n=document.createElement('div');n.className='note';n.textContent='Select all three correct answers.';card.appendChild(n)}quiz.appendChild(card)})}
function selectChoice(qi,ci){const item=state[qi],multi=item.q.multi===true;if(studyMode.checked&&item.revealed)return;if(multi){item.selected.has(ci)?item.selected.delete(ci):item.selected.add(ci);if(studyMode.checked&&item.selected.size===3)item.revealed=true}else{item.selected.clear();item.selected.add(ci);if(studyMode.checked)item.revealed=true}render()}
function isCorrect(item){const chosen=[...item.selected].map(i=>item.choices[i].original).sort((a,b)=>a-b),correct=[...item.q.correct].sort((a,b)=>a-b);return chosen.length===correct.length&&chosen.every((v,i)=>v===correct[i])}
function grade(){let correct=0,answered=0;state.forEach(item=>{if(item.selected.size>0)answered++;if(isCorrect(item))correct++;item.revealed=true});const pct=Math.round(correct/state.length*100);scoreText.textContent=`Score: ${correct}/${state.length} (${pct}%)`;result.textContent=`You answered ${correct} of ${state.length} correctly. ${answered} questions were answered.`;result.style.display='block';render();scrollTo({top:0,behavior:'smooth'})}
function escapeHtml(s){return s.replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#039;'}[m]))}
gradeBtn.onclick=grade;resetBtn.onclick=initialize;studyMode.onchange=()=>{state.forEach(x=>x.revealed=false);scoreText.textContent='Score: —';result.style.display='none';render()};initialize();
</script>
</body></html>
