<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>70-742 Active Directory Quiz</title>
  <style>
    :root{--bg:#070b18;--panel:#111827;--panel2:#0b1220;--text:#e5e7eb;--muted:#9ca3af;--border:#334155;--blue:#38bdf8;--green:#22c55e;--red:#ef4444;--yellow:#f59e0b}
    *{box-sizing:border-box} body{margin:0;background:var(--bg);color:var(--text);font-family:system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif;line-height:1.35}
    header{position:sticky;top:0;z-index:5;background:#0f172a;border-bottom:1px solid var(--border)}
    .bar{max-width:980px;margin:0 auto;padding:14px 18px;display:flex;gap:14px;align-items:center;justify-content:space-between;flex-wrap:wrap}
    h1{font-size:24px;margin:0}.sub{color:var(--muted);font-size:15px}.controls{display:flex;gap:10px;align-items:center;flex-wrap:wrap}
    label{display:flex;gap:7px;align-items:center;color:var(--muted);font-size:16px} input[type=checkbox]{width:20px;height:20px;accent-color:#1d9bf0}
    button{border:0;border-radius:10px;padding:11px 16px;font-weight:800;font-size:15px;cursor:pointer;color:#08111f}.btn-gray{background:#475569;color:white}.btn-blue{background:var(--blue)}.btn-red{background:var(--red);color:white}
    main{max-width:980px;margin:0 auto;padding:28px 18px 70px}.score{display:none;background:var(--panel);border:1px solid var(--border);border-radius:16px;padding:20px;margin-bottom:18px}.score h2{margin:0 0 4px;font-size:28px}.score p{margin:0;color:var(--muted)}
    .card{background:var(--panel);border:1px solid var(--border);border-radius:16px;padding:18px;margin:16px 0}.meta{display:flex;justify-content:space-between;gap:10px;color:#a5b4fc;font-size:14px;margin-bottom:10px}.tag{border:1px solid var(--border);border-radius:999px;padding:3px 9px;color:var(--muted)}
    .q{font-size:19px;font-weight:800;margin:0 0 14px}.choices{display:grid;gap:10px}.choice{background:var(--panel2);border:1px solid var(--border);border-radius:12px;padding:13px 14px;text-align:left;color:var(--text);font-weight:600;width:100%;cursor:pointer}.choice:hover{border-color:#64748b}.choice.selected{border-color:var(--blue);box-shadow:0 0 0 2px rgba(56,189,248,.25)}.choice.correct{background:#073f2b;border-color:var(--green)}.choice.wrong{background:#45151c;border-color:var(--red)}
    .explain{display:none;margin-top:12px;padding:13px 14px;border-radius:12px;background:#0b1220;color:var(--muted);font-weight:650}.explain b{color:var(--text)}
    .multi-note{color:#fbbf24;font-size:14px;margin:-6px 0 12px}.footer-note{color:var(--muted);font-size:13px;margin-top:24px}
    @media(max-width:650px){.bar{display:block}.controls{margin-top:12px}.q{font-size:18px}button{padding:10px 13px}.card{padding:15px}}
  </style>
</head>
<body>
<header><div class="bar"><div><h1>70-742 Active Directory Quiz</h1><div class="sub">Active Directory review • 16 questions • study mode works per-question</div></div><div class="controls"><label><input id="study" type="checkbox"> Study mode</label><button class="btn-gray" id="shuffle">Shuffle</button><button class="btn-blue" id="grade">Grade</button><button class="btn-red" id="retake">Retake</button></div></div></header>
<main><section id="score" class="score"></section><section id="quiz"></section><div class="footer-note">Study mode: click an answer to reveal that question only. Multiple-answer questions require selecting all correct choices before grade.</div></main>
<script>
const QUESTIONS = [
{q:"What types of accounts cannot be deleted?",choices:["Local Administrator account on a member server and local Administrator account on a standalone server","Domain Administrator account and Enterprise Administrator account","Any account created during Active Directory installation","Guest account and KRBTGT account"],answers:[0],note:"Built from friend review notes."},
{q:"How many SPNs should an administrator assign to a web application?",choices:["1","2","3","4"],answers:[1],note:"SPN = Service Principal Name."},
{q:"What does NTDSUTIL.exe create when run on a domain controller for this recovery/review scenario?",choices:["A snapshot of the Active Directory database","A new child domain","A new global catalog server","A DHCP reservation backup"],answers:[0],note:"Your notes say it creates a snapshot, mounts it as a volume, and saves related data to a specified folder/registry location."},
{q:"What is the traditional approach to group nesting?",choices:["AGUDLP","AGDLP only","UGALDP","LDAPGU"],answers:[0],note:"Accounts → Global → Universal → Domain Local → Permissions."},
{q:"What is the default authentication protocol for Windows computers, according to the review notes?",choices:["NTLM","LDAP","RADIUS","EAP"],answers:[0],note:"Review-note answer: NTLM. In AD environments, Kerberos is also central, but memorize the review answer for this quiz."},
{q:"What group type is used for nonsecurity-related functions?",choices:["Distribution groups","Security groups","Domain local groups","Global groups"],answers:[0],note:"Distribution groups are used for email/distribution-style functions, not permission assignment."},
{q:"What Microsoft domain service provides authentication for users and computers?",choices:["Active Directory Domain Services (AD DS)","Active Directory Certificate Services (AD CS)","Active Directory Federation Services (AD FS)","Active Directory Lightweight Directory Services (AD LDS)"],answers:[0],note:"AD DS is the core domain authentication/directory service."},
{q:"Which Kerberos setting is NOT configured by Group Policy, according to the review notes?",choices:["Minimum lifetime for service tickets","Maximum lifetime for user tickets","Maximum lifetime for service tickets","Enforce user logon restrictions"],answers:[0],note:"Memorize the review wording: minimum lifetime for service tickets."},
{q:"When you install a domain controller at a remote location, the connection to other domain controllers is usually what kind of link?",choices:["WAN link","Loopback link","Console link","Local-only link"],answers:[0],note:"Remote sites connect back over WAN links."},
{q:"Why are Global Catalog and Read-Only Domain Controller options greyed out when creating a new forest?",choices:["The first DC in a forest must be a global catalog server and cannot be read-only","The first DC must be read-only and cannot be a global catalog server","DNS must be installed before either option can be selected","The forest functional level must be raised first"],answers:[0],note:"First DC in a new forest is writable and must be GC."},
{q:"Which tab in a user account's properties is used to control logon hours?",choices:["Account","Profile","Member Of","Organization"],answers:[0],note:"Logon Hours is controlled from the Account tab."},
{q:"What is the process of identifying a user's identity by using a known value?",choices:["Authentication","Authorization","Accounting","Auditing"],answers:[0],note:"Authentication proves identity. Authorization decides access."},
{q:"A user's account is used by Windows to do which of the following?",choices:["Determine what changes you can make to the computer","Determine what files and folders you have access to","Track personal preferences like drive mappings","All of the above"],answers:[3],note:"Your notes listed all three functions."},
{q:"Which of the following can be members of a domain local group?",choices:["User accounts","Computer accounts","Global groups from the same forest","Domain local groups in the same domain","All of the above"],answers:[4],note:"This one is a multiple-item concept; the review notes listed all four."},
{q:"What term describes configuring one group as a member of another group?",choices:["Group nesting","Group scoping","Group conversion","Group delegation"],answers:[0],note:"Group nesting = putting one group inside another."},
{q:"Which group-scope logic best matches AGUDLP?",choices:["Put user Accounts into Global groups, Global groups into Universal groups, Universal groups into Domain Local groups, then assign Permissions","Put Domain Local groups into Universal groups, then into Global groups, then assign permissions","Assign permissions directly to every user account","Use only distribution groups for permissions"],answers:[0],note:"This reinforces the AGUDLP memorization path."}
];
let order=[...QUESTIONS.keys()];
let selected={};
let revealed={};
let graded=false;
const quiz=document.getElementById('quiz'); const score=document.getElementById('score'); const study=document.getElementById('study');
function letter(i){return String.fromCharCode(65+i)}
function isCorrect(qi){const q=QUESTIONS[qi]; const s=selected[qi]||[]; if(s.length!==q.answers.length)return false; return q.answers.every(a=>s.includes(a));}
function render(){quiz.innerHTML=''; order.forEach((qi,idx)=>{const q=QUESTIONS[qi]; const card=document.createElement('div'); card.className='card'; const multi=q.answers.length>1?'<div class="multi-note">Choose all that apply.</div>':''; card.innerHTML=`<div class="meta"><span>Question ${idx+1} of ${order.length}</span><span class="tag">Review ${qi+1}</span></div><div class="q">${q.q}</div>${multi}<div class="choices"></div><div class="explain">Correct answer: <b>${q.answers.map(a=>letter(a)+'. '+q.choices[a]).join('; ')}</b><br>${q.note||''}</div>`; const choices=card.querySelector('.choices'); q.choices.forEach((c,ci)=>{const b=document.createElement('button'); b.className='choice'; b.textContent=`${letter(ci)}. ${c}`; const sel=(selected[qi]||[]).includes(ci); const show=graded||revealed[qi]; if(sel)b.classList.add('selected'); if(show&&q.answers.includes(ci))b.classList.add('correct'); if(show&&sel&&!q.answers.includes(ci))b.classList.add('wrong'); b.onclick=()=>choose(qi,ci); choices.appendChild(b);}); if(graded||revealed[qi])card.querySelector('.explain').style.display='block'; quiz.appendChild(card);});}
function choose(qi,ci){const q=QUESTIONS[qi]; if(q.answers.length>1){let arr=selected[qi]?[...selected[qi]]:[]; arr=arr.includes(ci)?arr.filter(x=>x!==ci):[...arr,ci]; selected[qi]=arr;}else{selected[qi]=[ci];} if(study.checked){revealed[qi]=true;} graded=false; score.style.display='none'; render();}
function grade(){graded=true; const correct=order.filter(qi=>isCorrect(qi)).length; score.style.display='block'; score.innerHTML=`<h2>Score: ${correct} / ${order.length} (${Math.round(correct/order.length*100)}%)</h2><p>Retake any time. Change answers and grade again.</p>`; render(); window.scrollTo({top:0,behavior:'smooth'});}
function shuffle(){for(let i=order.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[order[i],order[j]]=[order[j],order[i]];} graded=false; score.style.display='none'; render();}
function retake(){selected={}; revealed={}; graded=false; score.style.display='none'; render(); window.scrollTo({top:0,behavior:'smooth'});}
study.addEventListener('change',()=>{revealed={}; graded=false; score.style.display='none'; render();});
document.getElementById('grade').onclick=grade; document.getElementById('shuffle').onclick=shuffle; document.getElementById('retake').onclick=retake; render();
</script>
</body>
</html>
