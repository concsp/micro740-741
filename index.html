<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>70-742 KT#2 Quiz</title>
<style>
:root{--bg:#0f172a;--card:#111827;--muted:#94a3b8;--text:#e5e7eb;--accent:#38bdf8;--border:#334155;--green:#16a34a;--red:#dc2626;--btn:#1e293b;--btn2:#0ea5e9}*{box-sizing:border-box}body{margin:0;font-family:system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif;background:linear-gradient(135deg,#0f172a,#111827);color:var(--text)}.wrap{max-width:980px;margin:0 auto;padding:22px}header{background:rgba(17,24,39,.88);border:1px solid var(--border);border-radius:18px;padding:18px;margin-bottom:18px;position:sticky;top:0;z-index:5;backdrop-filter:blur(10px)}h1{margin:0 0 6px;font-size:1.45rem}.sub{color:var(--muted);font-size:.95rem}.controls{display:flex;flex-wrap:wrap;gap:10px;margin-top:14px;align-items:center}button,label.toggle{border:1px solid var(--border);background:var(--btn);color:var(--text);padding:10px 13px;border-radius:12px;cursor:pointer;font-weight:650}button.primary{background:var(--btn2);border-color:#0284c7;color:white}button:hover,label.toggle:hover{filter:brightness(1.12)}input[type="checkbox"]{margin-right:8px;transform:scale(1.15)}#score{margin-top:12px;font-weight:750;color:#f8fafc}.qcard{background:rgba(17,24,39,.92);border:1px solid var(--border);border-radius:18px;padding:18px;margin:14px 0}.qtop{display:flex;gap:10px;align-items:flex-start}.num{color:var(--accent);font-weight:850;min-width:38px}.qtext{font-weight:750;line-height:1.35}.choices{margin-top:14px;display:grid;gap:9px}.choice{display:flex;gap:10px;align-items:flex-start;width:100%;border:1px solid var(--border);background:#0b1220;color:var(--text);border-radius:13px;padding:11px;text-align:left;cursor:pointer}.choice .letter{font-weight:850;color:#cbd5e1;min-width:22px}.choice.selected{outline:2px solid var(--accent);border-color:var(--accent)}.choice.correct{background:rgba(22,163,74,.22);border-color:var(--green)}.choice.wrong{background:rgba(220,38,38,.20);border-color:var(--red)}.feedback{margin-top:10px;color:var(--muted);font-size:.93rem;display:none}.feedback.show{display:block}.pill{display:inline-block;padding:2px 8px;border-radius:999px;border:1px solid var(--border);color:var(--muted);font-size:.85rem}
</style>
</head>
<body>
<div class="wrap">
<header>
<h1>70-742 KT#2 Review Quiz</h1>
<div class="sub">15-question single-page quiz. Study mode reveals feedback immediately after each question.</div>
<div class="controls"><button class="primary" onclick="gradeQuiz()">Grade</button><button onclick="resetQuiz()">Reset</button><button onclick="shuffleQuestions()">Shuffle Questions</button><label class="toggle"><input id="studyMode" type="checkbox" onchange="toggleStudyMode()">Study mode</label><span class="pill">15 questions</span></div>
<div id="score"></div>
</header>
<main id="quiz"></main>
</div>
<script>
const RAW_QUESTIONS = [
{question:"Which node contains settings that are applied when the user logs on?",choices:["User Configuration","Computer Configuration","Group Policy Objects","Security Settings"],correct:["User Configuration"]},
{question:"When creating network drives what will they allow you to do?",choices:["Create / Replace / Delete / Update","Create / Remove / Audit / Deny","Map / Redirect / Publish / Assign","Copy / Move / Rename / Restore"],correct:["Create / Replace / Delete / Update"]},
{question:"What is a component that extends the Windows Driver Model to provide an interface to the Operating System?",choices:["Windows Management Instrumentation (WMI)","Group Policy Management Console (GPMC)","Active Directory Certificate Services (ADCS)","Microsoft Management Console (MMC)"],correct:["Windows Management Instrumentation (WMI)"]},
{question:"You can prevent the inheritance of group policies by blocking all Group Policy settings from the GPOs linked to what?",choices:["Group Policy Hierarchy","User Configuration node","Local Policy container","Certificate Authority"],correct:["Group Policy Hierarchy"]},
{question:"When configuring group policies, when are computer configuration settings processed?",choices:["Start and Shutdown Process","Only when the user logs on","Only during manual gpupdate","When a certificate is issued"],correct:["Start and Shutdown Process"]},
{question:"What is used to assign user policies to Computer Objects themselves?",choices:["Group Policy Loopback Process","Folder Redirection","WMI Filtering","Security Filtering"],correct:["Group Policy Loopback Process"]},
{question:"Which MSI file is used to deploy customized MSI files?",choices:["MSI Transform Files","MSI Package Files","MSI Installer Logs","MSI Repair Files"],correct:["MSI Transform Files"]},
{question:"To create a distribution point on a server you first create a shared network folder where you will put the what?",choices:["WMI (Windows Management Instrumentation) File and any related files that you need for installation","Windows Installer package and any related files that you need for installation","Certificate template and private key files","Group Policy backup and SYSVOL files"],correct:["WMI (Windows Management Instrumentation) File and any related files that you need for installation"]},
{question:"What user configuration policy in Windows Settings allows you to redirect the content of certain folders to a network location or the user's local computer?",choices:["Folder Redirection","Drive Maps","Security Options","Software Restriction Policies"],correct:["Folder Redirection"]},
{question:"What server role allows you to issue and manage certificates as part of the public key infrastructure (PKI)?",choices:["ADCS (Active Directory Certificate Services)","ADDS (Active Directory Domain Services)","DHCP Server","DNS Server"],correct:["ADCS (Active Directory Certificate Services)"]},
{question:"What would not be a new extension introduced in group policy preferences?",choices:["Scanners","Drive Maps","Scheduled Tasks","Local Users and Groups"],correct:["Scanners"]},
{question:"What are the three benefits of PKI?",choices:["Confidentiality, Integrity, Authenticity (CIA)","Authentication, Replication, Delegation","Availability, Scalability, Compression","Auditing, Filtering, Inheritance"],correct:["Confidentiality, Integrity, Authenticity (CIA)"]},
{question:"What is a windows server 2016 server role that verifies the identity of a certificate requestor?",choices:["CA (Certificate Authority)","RODC (Read-Only Domain Controller)","KDC (Key Distribution Center)","DNS Resolver"],correct:["CA (Certificate Authority)"]},
{question:"Unlike ADM files, ADMX files are not stored in what?",choices:["individual group policies","the Central Store","SYSVOL","PolicyDefinitions"],correct:["individual group policies"]},
{question:"Which rules are in effect if a computer is disconnected from the network?",choices:["previously applied group policies","only local firewall rules","only domain-linked GPOs not cached","no group policies"],correct:["previously applied group policies"]}
];
let questions=[], selections={}, revealed={};
function shuffleArray(arr){const a=[...arr];for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]]}return a}
function prepQuestions(){questions=RAW_QUESTIONS.map((q,idx)=>({...q,id:idx,choices:shuffleArray(q.choices)}))}
function isMulti(q){return q.correct.length>1} function isCorrectChoice(q,c){return q.correct.includes(c)}
function renderQuiz(){const quiz=document.getElementById('quiz');quiz.innerHTML='';questions.forEach((q,index)=>{const card=document.createElement('section');card.className='qcard';card.innerHTML=`<div class="qtop"><div class="num">Q${index+1}</div><div class="qtext">${escapeHtml(q.question)} ${isMulti(q)?'<span class="pill">choose all that apply</span>':''}</div></div><div class="choices"></div><div class="feedback" id="fb-${q.id}"></div>`;const div=card.querySelector('.choices');q.choices.forEach((choice,cidx)=>{const btn=document.createElement('button');btn.className='choice';btn.type='button';btn.dataset.qid=q.id;btn.dataset.choice=choice;btn.innerHTML=`<span class="letter">${String.fromCharCode(65+cidx)}.</span><span>${escapeHtml(choice)}</span>`;btn.onclick=()=>selectAnswer(q.id,choice);div.appendChild(btn)});quiz.appendChild(card)});applyVisualState()}
function selectAnswer(qid,choice){const q=RAW_QUESTIONS[qid];if(isMulti(q)){if(!selections[qid]) selections[qid]=[];const i=selections[qid].indexOf(choice); if(i>=0) selections[qid].splice(i,1); else selections[qid].push(choice)} else selections[qid]=[choice]; if(document.getElementById('studyMode').checked) revealed[qid]=true; document.getElementById('score').textContent=''; applyVisualState()}
function applyVisualState(){document.querySelectorAll('.choice').forEach(btn=>{const qid=Number(btn.dataset.qid), choice=btn.dataset.choice, q=RAW_QUESTIONS[qid], selected=(selections[qid]||[]).includes(choice), show=!!revealed[qid];btn.classList.toggle('selected',selected&&!show);btn.classList.toggle('correct',show&&isCorrectChoice(q,choice));btn.classList.toggle('wrong',show&&selected&&!isCorrectChoice(q,choice))});RAW_QUESTIONS.forEach((q,qid)=>{const fb=document.getElementById(`fb-${qid}`);if(!fb)return;if(revealed[qid]){const picked=selections[qid]||[], correct=arraysEqual([...picked].sort(),[...q.correct].sort());fb.classList.add('show');fb.textContent=correct?'Correct.':`Correct answer: ${q.correct.join(' / ')}`}else{fb.classList.remove('show');fb.textContent=''}})}
function gradeQuiz(){let score=0;RAW_QUESTIONS.forEach((q,qid)=>{const picked=selections[qid]||[];if(arraysEqual([...picked].sort(),[...q.correct].sort())) score++;revealed[qid]=true});document.getElementById('score').textContent=`Score: ${score} / ${RAW_QUESTIONS.length} (${Math.round(score/RAW_QUESTIONS.length*100)}%)`;applyVisualState()}
function resetQuiz(){selections={};revealed={};document.getElementById('score').textContent='';applyVisualState();window.scrollTo({top:0,behavior:'smooth'})}
function shuffleQuestions(){questions=shuffleArray(questions);selections={};revealed={};document.getElementById('score').textContent='';renderQuiz()}
function toggleStudyMode(){document.getElementById('score').textContent='';applyVisualState()}
function arraysEqual(a,b){return a.length===b.length&&a.every((v,i)=>v===b[i])}
function escapeHtml(str){return String(str).replace(/[&<>"']/g,s=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#039;'}[s]))}
prepQuestions();renderQuiz();
</script>
</body>
</html>
