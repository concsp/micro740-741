let order = [...QUESTIONS.keys()];
let answers = new Map();
function shuffle(a){for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]]}return a}
function isMulti(q){return q.correct.length>1}
function render(){
 document.getElementById('stats').textContent = `${QUESTIONS.length} questions • duplicates merged • official wording where matched`;
 const quiz=document.getElementById('quiz'); quiz.innerHTML='';
 order.forEach((qi,displayIndex)=>{const q=QUESTIONS[qi]; const selected=answers.get(qi)||[]; const card=document.createElement('section'); card.className='card';
 const src=q.official?`Official #${q.official}`:'Review-only'; const rev=q.review_nums?`Review ${q.review_nums.join(', ')}`:q.review?`Review ${q.review}`:'';
 card.innerHTML=`<div class="qtop"><span>Question ${displayIndex+1} of ${QUESTIONS.length}</span><span><span class="pill">${src}</span> <span class="pill">${rev}</span></span></div><div class="qtext">${escapeHtml(q.question)} ${isMulti(q)?'<span class="muted">(Choose all that apply.)</span>':''}</div>`;
 q.choices.forEach((c,ci)=>{const b=document.createElement('button'); b.className='choice'; b.textContent=String.fromCharCode(65+ci)+'. '+c; if(selected.includes(ci)) b.classList.add('selected');
 b.onclick=()=>{ if(isMulti(q)){let arr=answers.get(qi)||[]; arr=arr.includes(ci)?arr.filter(x=>x!==ci):[...arr,ci]; answers.set(qi,arr)} else {answers.set(qi,[ci])} render(); if(document.getElementById('studyMode').checked) showStudy(); }; card.appendChild(b); });
 const fb=document.createElement('div'); fb.className='feedback'; fb.id='fb-'+qi; card.appendChild(fb); quiz.appendChild(card); });
 if(document.getElementById('studyMode').checked) showStudy();
}
function escapeHtml(s){return String(s).replace(/[&<>]/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[m]))}
function sameSet(a,b){return a.length===b.length && a.every(x=>b.includes(x))}
function grade(showOnly=false){let score=0; order.forEach(qi=>{const q=QUESTIONS[qi]; const sel=answers.get(qi)||[]; if(sameSet([...sel].sort(), [...q.correct].sort())) score++; const card=document.getElementById('fb-'+qi).parentElement; const btns=card.querySelectorAll('.choice'); btns.forEach((b,i)=>{b.classList.remove('correct','wrong'); if(q.correct.includes(i)) b.classList.add('correct'); if(sel.includes(i)&&!q.correct.includes(i)) b.classList.add('wrong');}); const fb=document.getElementById('fb-'+qi); fb.classList.add('show'); fb.innerHTML=`Correct answer: <b>${q.correct.map(i=>String.fromCharCode(65+i)+'. '+escapeHtml(q.choices[i])).join('<br>')}</b>`; }); const pct=Math.round(score/QUESTIONS.length*100); const sum=document.getElementById('summary'); sum.classList.add('show'); sum.innerHTML=`<div class="score">Score: ${score} / ${QUESTIONS.length} (${pct}%)</div><div class="muted">Retake any time. Change answers and grade again.</div>`; if(!showOnly) window.scrollTo({top:0,behavior:'smooth'});}
function showStudy(){grade(true)}
document.getElementById('gradeBtn').onclick=()=>grade(false);
document.getElementById('resetBtn').onclick=()=>{answers=new Map(); document.getElementById('summary').classList.remove('show'); render(); window.scrollTo({top:0,behavior:'smooth'})};
document.getElementById('shuffleBtn').onclick=()=>{shuffle(order); render();};
document.getElementById('studyMode').onchange=()=>render();
render();
</script>
</body>
</html>
