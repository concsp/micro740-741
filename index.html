": "a", "text": "Blocking"}, {"letter": "b", "text": "Suspended"}, {"letter": "c", "text": "Drainstop"}, {"letter": "d", "text": "Multimode"}], "correct": ["c"], "multi": false}, {"review": "65", "official": 210, "source": "official", "question": "What is the best way to back up the Certificate Services database without backing up any  extra files? (Choose all that apply.)", "choices": [{"letter": "a", "text": "Perform a full backup."}, {"letter": "b", "text": "Perform a system state backup."}, {"letter": "c", "text": "Perform a backup of the C:\\Windows\\Cert folder."}, {"letter": "d", "text": "Perform a backup using the certutil.exe command."}], "correct": ["d"], "multi": false}, {"review": "66", "official": 195, "source": "official", "question": "Which of the following is the minimum forest functional level the Active Directory forest  must meet to enable the Active Directory Recycle Bin?", "choices": [{"letter": "a", "text": "Windows Server 2008"}, {"letter": "b", "text": "Windows Server 2008 R2"}, {"letter": "c", "text": "Windows Server 2012 R2"}, {"letter": "d", "text": "Windows Server 2003 R2"}, {"letter": "e", "text": "Windows Server 2016"}], "correct": ["b"], "multi": false}, {"review": "67", "official": 158, "source": "official", "question": "Which setting is configured in an NLB cluster that determines how the member nodes are  going to handle the load when the “multiple host” filter mode is used?", "choices": [{"letter": "a", "text": "Affinity"}], "correct": ["a"], "multi": false}, {"review": "68", "official": 180, "source": "official", "question": "Which type of Windows Defender scan uses signature detection methodology and heuristics to monitor and catch malware behavior?", "choices": [{"letter": "a", "text": "Full scan"}, {"letter": "b", "text": "Quick scan"}, {"letter": "c", "text": "Real-time scan"}, {"letter": "d", "text": "Custom scan"}], "correct": ["c"], "multi": false}, {"review": "69", "official": 183, "source": "official", "question": "Which type of Windows Defender scan checks only the areas that most likely contain malware?", "choices": [{"letter": "a", "text": "Full scan"}, {"letter": "b", "text": "Quick scan"}, {"letter": "c", "text": "Real-time scan"}, {"letter": "d", "text": "Custom scan"}], "correct": ["b"], "multi": false}, {"review": "70", "official": 188, "source": "official", "question": "Which of the following would not be a good usage of manual backups? a. Backing up a volume that is not included in the regularly scheduled backup routine b. Making a special backup outside of the current backup schedule", "choices": [{"letter": "a", "text": "Making normal backups without a schedule"}, {"letter": "b", "text": "Making a backup to store in a different location than the scheduled backups"}], "correct": ["a"], "multi": false}, {"review": "71", "official": 193, "source": "official", "question": "By default, where will backups of DHCP be sent when backups are configured? a. %systemroot%\\Windows\\Dhcp\\Backup", "choices": [{"letter": "a", "text": "%systemroot%\\Windows\\System32\\Dhcp\\Backup"}, {"letter": "b", "text": "%systemroot%\\Windows\\System32\\Backup\\Dhcp"}, {"letter": "c", "text": "%systemroot%\\Windows\\Backup\\Dhcp"}], "correct": ["a"], "multi": false}, {"review": "72", "official": 198, "source": "official", "question": "Which type of backup allows an administrator to recover the server to another server with  the same or different hardware?", "choices": [{"letter": "a", "text": "Bare Metal Recovery"}, {"letter": "b", "text": "Full server"}, {"letter": "c", "text": "System state"}, {"letter": "d", "text": "System Reserved"}], "correct": ["a"], "multi": false}, {"review": "73", "official": 190, "source": "official", "question": "Which of the following is contained within the Backup <Date><ID number> folder created  by Windows Server Backup? (Choose all that apply.)", "choices": [{"letter": "a", "text": "Virtual hard disk (VHD) files that are basically duplicates of the volumes"}, {"lett let order = QUESTIONS.map((_,i)=>i);
let answers = {};        // qIndex -> Set of selected letters
let revealed = new Set();  // questions revealed in Study mode or after Grade
let graded = false;
function esc(s){return String(s).replace(/[&<>'"]/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;',"'":'&#39;','"':'&quot;'}[m]));}
function same(a,b){a=[...a].sort().join(','); b=[...b].sort().join(','); return a===b;}
function shuffle(a){for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}}
function getAns(i){return answers[i] || new Set();}
function setAns(i,letter,checked,multi){
  if(!answers[i]) answers[i]=new Set();
  if(multi) checked ? answers[i].add(letter) : answers[i].delete(letter);
  else answers[i]=new Set([letter]);
}
function correctText(q){return q.correct.map(l=>{const c=q.choices.find(x=>x.letter===l); return `<strong>${l.toUpperCase()}.</strong> ${esc(c?c.text:l)}`;}).join('<br>');}
function render(){
  const root=document.getElementById('quiz'); root.innerHTML='';
  const study=document.getElementById('studyMode').checked;
  document.getElementById('status').textContent = study ? 'Study mode: click an answer to reveal only that question. No score changes until Grade.' : 'Quiz mode: select answers, then click Grade.';
  order.forEach((qi,pos)=>{
    const q=QUESTIONS[qi]; const ans=getAns(qi); const isRevealed=revealed.has(qi); const sec=document.createElement('section');
    sec.className='question' + (isRevealed ? ' revealed' : '');
    const source = `${q.official ? 'Official #'+q.official : 'Review-only'}${q.review ? ' / Review '+q.review : ''}`;
    sec.innerHTML=`<div class="qtop"><div class="qnum">Question ${pos+1} of ${QUESTIONS.length}</div><div class="source">${esc(source)}</div></div><div class="qtext">${esc(q.question)}</div>`;
    q.choices.forEach(c=>{
      const selected=ans.has(c.letter); const correct=q.correct.includes(c.letter); let cls='choice';
      if(isRevealed){ if(correct) cls+=' correct'; if(selected && !correct) cls+=' wrong'; if(graded && correct && !selected) cls+=' missed'; }
      const lab=document.createElement('label'); lab.className=cls;
      lab.innerHTML=`<input autocomplete="off" type="${q.multi?'checkbox':'radio'}" name="q${qi}" value="${c.letter}" ${selected?'checked':''}> <strong>${c.letter.toUpperCase()}.</strong> ${esc(c.text)}`;
      lab.querySelector('input').addEventListener('change', e=>{
        setAns(qi,c.letter,e.target.checked,q.multi);
        if(document.getElementById('studyMode').checked && !graded) revealed.add(qi);
        render();
      });
      sec.appendChild(lab);
    });
    const fb=document.createElement('div'); fb.className='feedback'; fb.innerHTML='Correct answer:<br>'+correctText(q); sec.appendChild(fb); root.appendChild(sec);
  });
}
function grade(){
  graded=true; revealed=new Set(QUESTIONS.map((_,i)=>i));
  let right=0, unanswered=0; QUESTIONS.forEach((q,i)=>{const a=getAns(i); if(a.size===0) unanswered++; if(same(a,q.correct)) right++;});
  const pct=Math.round(right/QUESTIONS.length*100); const box=document.getElementById('scoreBox'); box.classList.add('show');
  box.innerHTML=`<h2 style="margin:0 0 6px">Score: ${right} / ${QUESTIONS.length} (${pct}%)</h2><div class="small">${unanswered} unanswered. Green = correct answer; red = your wrong choice; yellow = missed correct choice.</div>`;
  render(); window.scrollTo({top:0,behavior:'smooth'});
}
function retake(shuf=false){answers={}; revealed=new Set(); graded=false; if(shuf) shuffle(order); document.getElementById('scoreBox').classList.remove('show'); document.getElementById('scoreBox').innerHTML=''; render(); window.scrollTo({top:0,behavior:'smooth'});}
document.getElementById('studyMode').addEventListener('change', ()=>{ revealed=new Set(); graded=false; document.getElementById('scoreBox').classList.remove('show'); render(); });
document.getElementById('gradeBtn').addEventListener('click', grade);
document.getElementById('retakeBtn').addEventListener('click', ()=>retake(false));
document.getElementById('shuffleBtn').addEventListener('click', ()=>retake(true));
window.addEventListener('pageshow', ()=>{ document.querySelectorAll('input[type=radio], input[type=checkbox]').forEach(x=>{ if(x.id!=='studyMode') x.checked=false; }); });
render();
</script>
