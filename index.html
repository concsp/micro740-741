<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>70-742 Active Directory Quiz</title>
  <style>
    :root{--bg:#070b18;--panel:#111827;--panel2:#0b1220;--text:#e5e7eb;--muted:#9ca3af;--border:#334155;--blue:#38bdf8;--green:#22c55e;--red:#ef4444;--yellow:#f59e0b}
    *{box-sizing:border-box} body{margin:0;background:var(--bg);color:var(--text);font-family:system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif;line-height:1.35}
    header{position:sticky;top:0;z-index:5;background:#0f172a;border-bottom:1px solid var(--border)}
    .bar{max-width:1000px;margin:0 auto;padding:14px 18px;display:flex;gap:14px;align-items:center;justify-content:space-between;flex-wrap:wrap}
    h1{font-size:24px;margin:0}.sub{color:var(--muted);font-size:15px}.controls{display:flex;gap:10px;align-items:center;flex-wrap:wrap}
    label{display:flex;gap:7px;align-items:center;color:var(--muted);font-size:16px} input[type=checkbox]{width:20px;height:20px;accent-color:#1d9bf0}
    button{border:0;border-radius:10px;padding:11px 16px;font-weight:800;font-size:15px;cursor:pointer;color:#08111f}.btn-gray{background:#475569;color:white}.btn-blue{background:var(--blue)}.btn-red{background:var(--red);color:white}
    main{max-width:1000px;margin:0 auto;padding:28px 18px 70px}.score{display:none;background:var(--panel);border:1px solid var(--border);border-radius:16px;padding:20px;margin-bottom:18px}.score h2{margin:0 0 4px;font-size:28px}.score p{margin:0;color:var(--muted)}
    .card{background:var(--panel);border:1px solid var(--border);border-radius:16px;padding:18px;margin:16px 0}.meta{display:flex;justify-content:space-between;gap:10px;color:#a5b4fc;font-size:14px;margin-bottom:10px}.tag{border:1px solid var(--border);border-radius:999px;padding:3px 9px;color:var(--muted)}
    .q{font-size:19px;font-weight:800;margin:0 0 14px}.choices{display:grid;gap:10px}.choice{background:var(--panel2);border:1px solid var(--border);border-radius:12px;padding:13px 14px;text-align:left;color:var(--text);font-weight:600;width:100%;cursor:pointer}.choice:hover{border-color:#64748b}.choice.selected{border-color:var(--blue);box-shadow:0 0 0 2px rgba(56,189,248,.25)}.choice.correct{background:#073f2b;border-color:var(--green)}.choice.wrong{background:#45151c;border-color:var(--red)}
    .explain{display:none;margin-top:12px;padding:13px 14px;border-radius:12px;background:#0b1220;color:var(--muted);font-weight:650}.explain b{color:var(--text)}
    .multi-note{color:#fbbf24;font-size:14px;margin:-6px 0 12px}.footer-note{color:var(--muted);font-size:13px;margin-top:24px}
    @media(max-width:650px){.bar{display:block}.controls{margin-top:12px}.q{font-size:18px}button{padding:10px 13px}.card{padding:15px}}
  </style>
</head>
<body>
<header><div class="bar"><div><h1>70-742 Active Directory Quiz</h1><div class="sub">AD review • 15 questions • answer positions randomized</div></div><div class="controls"><label><input id="study" type="checkbox"> Study mode</label><button class="btn-gray" id="shuffle">Shuffle</button><button class="btn-blue" id="grade">Grade</button><button class="btn-red" id="retake">Retake</button></div></div></header>
<main><section id="score" class="score"></section><section id="quiz"></section><div class="footer-note">Study mode: click an answer to reveal that question only. Multiple-answer questions require selecting every correct answer before grading.</div></main>
<script>
const RAW_QUESTIONS = [
  {q:"What types of accounts can't be deleted?", correct:["Local admin account on member server","Local admin on stand alone server"], wrong:["Domain Admins group","Enterprise Admins group","A regular domain user account","A disabled user account"], multi:true},
  {q:"How many SPN's should an admin assign to a web application?", correct:["2"], wrong:["1","3","4"]},
  {q:"What does the NTDSUTIL.exe command create when it is ran on a domain controller?", correct:["Creates snapshot on AD database","Mounts as volume","Save to a specified folder in the windows registry."], wrong:["Creates a new domain controller","Creates a new Group Policy Object","Deletes the Active Directory database"], multi:true},
  {q:"What is the traditional approach to groupnesting?", correct:["AGUDLP"], wrong:["AGDLP","AUGDL","DAGULP"]},
  {q:"What is the default authentication protocol for Windows computers?", correct:["NTLM"], wrong:["LDAP","RADIUS","EAP"]},
  {q:"What group type is used for nonsecurity related functions?", correct:["Distribution groups"], wrong:["Security groups","Domain local groups","Global groups"]},
  {q:"What Microsoft domain service provides authentication for users and computers?", correct:["(ADDS) Active Directory Domain Service"], wrong:["(ADCS) Active Directory Certificate Services","(ADFS) Active Directory Federation Services","(ADLDS) Active Directory Lightweight Directory Services"]},
  {q:"Kerberos setting are configured by group policy? Which is not", correct:["Mim lifetime for service tickets"], wrong:["Maximum lifetime for service tickets","Maximum lifetime for user tickets","Enforce user logon restrictions"]},
  {q:"When you install dc at a remote location the connection to other dc is what kind of link?", correct:["WAN link"], wrong:["LAN link","Loopback link","Console link"]},
  {q:"Why are the global catalog and read only domain controllers greyed out when you create a new forest?", correct:["First DC in forest must be a global catalog server","Cannot be read only DC"], wrong:["DNS must be installed first","The domain must already have two DCs","The forest functional level must be raised first"], multi:true},
  {q:"Which tab in a user account properties would be used to control log in hours?", correct:["Account"], wrong:["Profile","Member Of","Organization"]},
  {q:"The process for identifying a users identity by using a known value.", correct:["Authentication"], wrong:["Authorization","Accounting","Auditing"]},
  {q:"A users account is used by windows to do what?", correct:["What changes you can make to computer","Determine what files and folders you have access to","Track personal preferences like drive mappings"], wrong:["Create DNS zones automatically","Install DHCP scopes automatically","Assign SPNs to every web application"], multi:true},
  {q:"Which of the following can be members of the domain local group", correct:["User account","Computer account","Global group from same forest","Domain local groups in same domain"], wrong:["Local users from a standalone workgroup computer","Every object in Active Directory automatically","Only universal groups"], multi:true},
  {q:"What term describes the process for configuring one or more members of another group?", correct:["Groupnesting"], wrong:["Group scoping","Group conversion","Group delegation"]}
];
let order = RAW_QUESTIONS.map((_,i)=>i);
let choiceOrder = {};
let selected = {};
let revealed = {};
let graded = false;
const quiz=document.getElementById('quiz'), score=document.getElementById('score'), study=document.getElementById('study');
function shuffleArray(arr){const a=[...arr];for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}return a;}
function setupChoices(){choiceOrder={}; RAW_QUESTIONS.forEach((q,qi)=>{const choices=[...q.correct.map(text=>({text,correct:true})),...q.wrong.map(text=>({text,correct:false}))]; choiceOrder[qi]=shuffleArray(choices);});}
function letter(i){return String.fromCharCode(65+i)}
function selectedChoices(qi){return selected[qi]||[];}
function isCorrect(qi){const choices=choiceOrder[qi]; const sel=selectedChoices(qi); const correctIdx=choices.map((c,i)=>c.correct?i:null).filter(i=>i!==null); if(sel.length!==correctIdx.length)return false; return correctIdx.every(i=>sel.includes(i));}
function correctText(qi){return choiceOrder[qi].map((c,i)=>c.correct?`${letter(i)}. ${c.text}`:null).filter(Boolean).join('; ')}
function render(){quiz.innerHTML=''; order.forEach((qi,idx)=>{const q=RAW_QUESTIONS[qi]; const card=document.createElement('div'); card.className='card'; const multi=q.multi?'<div class="multi-note">Choose all that apply.</div>':''; card.innerHTML=`<div class="meta"><span>Question ${idx+1} of ${order.length}</span><span class="tag">Review ${qi+1}</span></div><div class="q">${q.q}</div>${multi}<div class="choices"></div><div class="explain">Correct answer: <b>${correctText(qi)}</b></div>`; const choicesEl=card.querySelector('.choices'); choiceOrder[qi].forEach((c,ci)=>{const b=document.createElement('button'); b.className='choice'; b.textContent=`${letter(ci)}. ${c.text}`; const sel=selectedChoices(qi).includes(ci); const show=graded||revealed[qi]; if(sel)b.classList.add('selected'); if(show&&c.correct)b.classList.add('correct'); if(show&&sel&&!c.correct)b.classList.add('wrong'); b.onclick=()=>choose(qi,ci); choicesEl.appendChild(b);}); if(graded||revealed[qi])card.querySelector('.explain').style.display='block'; quiz.appendChild(card);});}
function choose(qi,ci){const q=RAW_QUESTIONS[qi]; if(q.multi){let arr=selectedChoices(qi); arr=arr.includes(ci)?arr.filter(x=>x!==ci):[...arr,ci]; selected[qi]=arr;}else{selected[qi]=[ci];} if(study.checked)revealed[qi]=true; graded=false; score.style.display='none'; render();}
function grade(){graded=true; const correct=order.filter(qi=>isCorrect(qi)).length; score.style.display='block'; score.innerHTML=`<h2>Score: ${correct} / ${order.length} (${Math.round(correct/order.length*100)}%)</h2><p>Retake any time. Change answers and grade again.</p>`; render(); window.scrollTo({top:0,behavior:'smooth'});}
function shuffleQuestions(){order=shuffleArray(order); graded=false; score.style.display='none'; render();}
function retake(){selected={}; revealed={}; graded=false; score.style.display='none'; setupChoices(); render(); window.scrollTo({top:0,behavior:'smooth'});}
study.addEventListener('change',()=>{revealed={}; graded=false; score.style.display='none'; render();});
document.getElementById('grade').onclick=grade; document.getElementById('shuffle').onclick=shuffleQuestions; document.getElementById('retake').onclick=retake; setupChoices(); render();
</script>
</body>
</html>
