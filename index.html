<!doctype html><html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Exchange Midterm Review</title><style>
body{font-family:Arial,sans-serif;background:#0f172a;color:#fff;margin:0}.wrap{max-width:900px;margin:auto;padding:18px}header{position:sticky;top:0;background:#0f172af2;padding:14px 0;border-bottom:1px solid #334155;z-index:5}.card{background:#111827;border:1px solid #334155;border-radius:14px;padding:16px;margin:14px 0}.choice{display:block;width:100%;text-align:left;margin:8px 0;padding:11px;border-radius:10px;border:1px solid #475569;background:#1f2937;color:#fff}.choice.selected{outline:2px solid #3b82f6}.choice.correct{background:#14532d}.choice.wrong{background:#7f1d1d}button.ctrl{padding:10px 14px;border:0;border-radius:10px;margin-right:8px;font-weight:700}.primary{background:#3b82f6;color:#fff}.secondary{background:#334155;color:#fff}.meta{color:#94a3b8}#result{font-weight:700;margin-top:10px}
</style></head><body><header><div class="wrap"><h1>Exchange Midterm Review — 50 Questions</h1><div class="meta">Study mode gives instant feedback. Exam mode grades at the end.</div><div style="margin-top:10px"><button class="ctrl primary" onclick="grade()">Grade</button><button class="ctrl secondary" onclick="resetQuiz()">Retake</button><label><input id="study" type="checkbox"> Study mode</label> <span id="score"></span></div></div></header><main class="wrap"><div id="result"></div><div id="quiz"></div></main><script>
const QUESTIONS=[{"q": "After obtaining a new server certificate, where is the certificate installed?", "options": ["Edge Transport Server", "Hub Transport Server", "Client Access Server", "Mailbox Server"], "answer": 2}, {"q": "When Outlook requires a profile to be created, what service is used to provide that configuration information for the client and also to repair Exchange Server connection settings or discover a new mailbox?", "options": ["Auto Discover", "Outlook Anywhere", "Recipient Update Service", "Exchange Control Panel"], "answer": 0}, {"q": "The Exchange Control Panel allows all mailbox users to configure most of the mailbox settings except for:", "options": ["Automatic replies", "Manage existing mailbox / RBAC permissions", "Inbox rules", "Mobile device settings"], "answer": 1}, {"q": "Which cmdlet will be used to display information in new mailbox?", "options": ["Enable-Mailbox", "New-Mailbox", "Set-Mailbox", "Get-Mailbox"], "answer": 3}, {"q": "When enabling IMAP4 or POP3 which settings enable the configuration of supportive authentication options?", "options": ["Protocol logging settings", "Mailbox quota settings", "Transport settings", "Authentication settings"], "answer": 3}, {"q": "Which certificates are the most expensive authority when choosing a certification authority?", "options": ["Private CA", "Enterprise CA", "Public CA", "Standalone CA"], "answer": 2}, {"q": "In Exchange Server Messaging Environment where must you deploy a Hub Transport Server Role", "options": ["Only in the perimeter network", "In each AD site where a Mailbox Server Role is installed", "On every domain controller", "Only in the root domain"], "answer": 1}, {"q": "Which troubleshooting step in Outlook Client uses DNS Hostname Resolution to resolve the name of the Exchange Server to its IP address?", "options": ["Reset the Outlook profile", "Identify Name Resolution Issues", "Test MAPI permissions", "Verify mailbox quotas"], "answer": 1}, {"q": "Which option would you configure in accepted domains to allow the Hub Transport or Edge Transport Server to accept the email but relay it to an alternate SMTP server?", "options": ["Authoritative Domain", "External Relay Domain", "Internal Relay Domain", "Remote Domain"], "answer": 1}, {"q": "How does Outlook Anywhere work?", "options": ["IMAP4 over HTTPS", "MAPI over SMTP", "POP3 over TLS", "RPC over HTTP"], "answer": 3}, {"q": "Which tool automatically examines an Exchange Server deployment and determines whether the configuration is inline with Microsoft best practices?", "options": ["Exchange Queue Viewer", "Remote Connectivity Analyzer", "Performance Monitor", "Best Practices Analyzer Tool"], "answer": 3}, {"q": "Within the message transport in Exchange Server 2010, which queue stores all messages on a disk until the categorizer processes them for delivery?", "options": ["delivery", "submission", "poison", "unreachable"], "answer": 1}, {"q": "Which two roles is Back Pressure installed on", "options": ["Mailbox and Edge Transport", "Client Access and Unified Messaging", "Mailbox and Client Access", "Hub Transport and Edge Transport"], "answer": 3}, {"q": "Which directory are the configuration options for Back Pressure located?", "options": ["Scripts directory", "TransportRoles directory", "BIN directory", "Config directory"], "answer": 2}, {"q": "Which information defines the type of objects and attributes that can be created in AD LDS", "options": ["Global Catalog", "Schema", "Application partition", "Configuration partition"], "answer": 1}, {"q": "Anti-virus / Anti-spam is the answer (LONG QUESTION not stated)", "options": ["Mailbox auditing", "Anti-virus / Anti-spam", "Transport journaling", "Message tracking"], "answer": 1}, {"q": "Where does a Win 2008 R2 Edge Server store its configuration information?", "options": ["AD LDS", "Windows Registry only", "AD DS", "SQL Server"], "answer": 0}, {"q": "Which server role in Exchange Server 2010 provides a secure SMTP gateway for all incoming and outgoing email in an organization?", "options": ["Mailbox", "Edge Transport", "Hub Transport", "Client Access"], "answer": 1}, {"q": "Which agent is used to reduce spam and viruses on the Edge Transport or Hub Transport servers to reduce the spread of malware attachment before they enter the organization?", "options": ["Attachment filtering", "Recipient filtering", "Content indexing", "Sender filtering"], "answer": 0}, {"q": "____ reduces how often the message is scanned as it proceeds through an organization by tagging scanned messages with a version of antivirus software that performs the scan and scanned results?", "options": ["Safe Lists Aggregation", "Back Pressure", "Antivirus Stamping", "Message Tracking"], "answer": 2}, {"q": "What is it called when a public key encrypts the hash value therefore a message is digitally signed to prevent its sender from disowning the message?", "options": ["Availability", "Authorization", "Confidentiality", "Non-repudiation"], "answer": 3}, {"q": "____ is a standard that you can use to implement public key encryption and email message signatures.", "options": ["S/MIME", "MAPI", "SMTP", "TLS"], "answer": 0}, {"q": "Which option is not provided by a digital signature?", "options": ["Integrity", "Authentication", "Authorization", "Non-repudiation"], "answer": 2}, {"q": "What provides a set of extensions to the basic IP protocol and can be used to encrypt server to server communications?", "options": ["S/MIME", "IP Sec", "SSL", "RPC"], "answer": 1}, {"q": "Which Exchange Server Role enables connections from all available client protocols to the Exchange Server Mailboxes?", "options": ["Edge Transport Server Role", "Client Access Server Role", "Mailbox Server Role", "Hub Transport Server Role"], "answer": 1}, {"q": "In which AD partition can configuration information for the AD DS be found?", "options": ["Application Partition", "Domain Partition", "Schema Partition", "Configuration Partition"], "answer": 3}, {"q": "SRV Resource Records are what type of records?", "options": ["DHCP", "DNS", "LDAP", "WINS"], "answer": 1}, {"q": "Which AD component is a collection of computers a Microsoft Windows Network Administrator defines", "options": ["Forest", "Organizational Unit", "Domain", "Site"], "answer": 2}, {"q": "Which of the following is not a benefit of deploying Exchange Server as virtual machines?", "options": ["Hardware consolidation", "More secure", "Improved flexibility", "Faster recovery"], "answer": 1}, {"q": "Which command is used to specify the name to give to the new Exchange Organization?", "options": ["/NewOrganization", "/ExchangeName", "/Org", "/OrganizationName"], "answer": 3}, {"q": "What is deployed on the Hub and Edge Transport Servers to protect against viruses within emails?", "options": ["Mailbox Assistant", "Transport Agent / Antivirus Agent (Apart of Forefront Protection for Exchange 2010)", "RPC Client Access Service", "Unified Messaging Agent"], "answer": 1}, {"q": "For most organizations ___ is/are a critical part of the network people rely on this service to perform their jobs.", "options": ["Print Services", "Exchange or Email/Messaging", "DHCP", "WINS"], "answer": 1}, {"q": "The ____ exposes different admin tasks in response to the selections made within the result and workpanes", "options": ["Console Tree", "Toolbox", "Result Pane", "Action Pane"], "answer": 3}, {"q": "Which configuration node would be used to assign values to the mailboxes, distro groups, and contacts?", "options": ["Recipient", "Toolbox", "Server", "Organization"], "answer": 0}, {"q": "What is the small executable files written in Microsoft Visual C# or any other Microsoft .NET framework compliant language called?", "options": ["Managed Folder", "Snap-in", "Transport Agent", "Simple Cmdlet"], "answer": 3}, {"q": "How many new cmdlets were added to the EMS?", "options": ["1,000", "700", "70", "170"], "answer": 1}, {"q": "What enables granular permission to be assigned to the admins and more closely align the roles that assign users and admins to the actual roles they hold within an organization?", "options": ["UAC", "RBAC", "ACL", "DAC"], "answer": 1}, {"q": "What should be done before deploying mailboxes on the Mailbox Server role which will include configuration permissions at the organizational server levels to reduce the Exchange Server Attack Surface?", "options": ["Enable POP3", "Install public folders", "Create a receive connector", "Secure the server"], "answer": 3}, {"q": "Which RAID option increases fault tolerance by placing redundant copies of data on two Disks?", "options": ["RAID 5", "JBOD", "RAID 1", "RAID 0"], "answer": 2}, {"q": "Which statement/s are considered best practices for Public Folder deployment?", "options": ["Replicate only during peak hours", "Place all public folders on Edge Transport", "In cases of limited bandwidth, schedule Public Folder replication during non-peak hours", "Disable replication permanently"], "answer": 2}, {"q": "A ____ mailbox can be assigned to a meeting location or to a resource such as a projector.", "options": ["Discovery", "Linked", "Archive", "Resource"], "answer": 3}, {"q": "Which type of resource mailboxes can you assign to resources that are not location specific, such as portable computer projectors, microphones, or company cars?", "options": ["Linked mailboxes", "Room mailboxes", "Shared mailboxes", "Equipment mailboxes"], "answer": 3}, {"q": "Which cmdlet would you use to list the members of the sales group?", "options": ["Get-GroupMember Sales", "Get-DistributionGroupSales", "Get-DistributionGroupMember", "Get-Mailbox Sales"], "answer": 1}, {"q": "If you enable multiple AD sites, you can provide internet access to each site by configuring an external URL to which server?", "options": ["Hub Transport Server", "Edge Transport Server", "Mailbox Server", "Client Access Server"], "answer": 3}, {"q": "When creating an email address policy, which box would you \u2018check\u2019 if you want your email address policy to apply to security groups or distribution groups that have been mail-enabled?", "options": ["Resource mailboxes", "Legacy mailboxes", "External contacts", "Mail-enabled groups"], "answer": 3}, {"q": "You can use ____ commands to manage multiple recipients or other objects at one time, primarily through using piping and filtering?", "options": ["DOS", "PowerShell", "WMIC", "VBScript"], "answer": 1}, {"q": "What service was introduced in Exchange Server 2007 as a feature where Office Outlook 2007 or newer clients as well as some mobile devices automatically configure their profile to access Exchange Server?", "options": ["Address Book Service", "Availability Service", "Mailbox Replication Service", "Autodiscover Service"], "answer": 3}, {"q": "Exchange Server 2010 provides several options or ____ that you can use for configuring resource mailbox setting and for customizing the resource mailbox to meet your organization\u2019s needs.", "options": ["Retention Policies", "Transport Rules", "Address Lists", "Booking Policies"], "answer": 3}, {"q": "What options are used to assign moderator\u2019s permission to review all messages that are sent to the distribution list?", "options": ["Message moderation", "Journaling", "MailTips", "Delivery reports"], "answer": 0}, {"q": "There are two ways to configure an offline address book, either Public Folders or ___?", "options": ["MAPI", "POP3", "HTTP", "SMTP"], "answer": 2}];let state=[];function resetQuiz(){state=QUESTIONS.map(()=>({sel:null,revealed:false}));score.textContent='';result.textContent='';render();}function render(){quiz.innerHTML='';QUESTIONS.forEach((q,qi)=>{const c=document.createElement('div');c.className='card';c.innerHTML=`<div class="meta">Question ${qi+1}</div><h3>${esc(q.q)}</h3>`;q.options.forEach((o,oi)=>{const b=document.createElement('button');b.className='choice';b.textContent=String.fromCharCode(65+oi)+'. '+o;if(state[qi].sel===oi)b.classList.add('selected');if(state[qi].revealed){if(oi===q.answer)b.classList.add('correct');else if(state[qi].sel===oi)b.classList.add('wrong');}b.onclick=()=>{state[qi].sel=oi;if(study.checked)state[qi].revealed=true;render();};c.appendChild(b);});quiz.appendChild(c);});}function grade(){let n=0;state.forEach((s,i)=>{if(s.sel===QUESTIONS[i].answer)n++;s.revealed=true;});score.textContent=`Score: ${n}/50`;result.textContent=`You got ${n} out of 50 correct.`;render();scrollTo({top:0,behavior:'smooth'});}function esc(s){return s.replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#039;'}[m]));}study.onchange=()=>{state.forEach(s=>s.revealed=false);score.textContent='';result.textContent='';render();};resetQuiz();
</script></body></html>
