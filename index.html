<!doctype html>
<html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Exchange 2010 Final Review</title>
<style>
body{margin:0;font-family:Arial,sans-serif;background:#0f172a;color:#fff}.wrap{max-width:920px;margin:auto;padding:18px}
header{position:sticky;top:0;background:#0f172af2;border-bottom:1px solid #334155;z-index:5}.meta{color:#94a3b8}
.controls{display:flex;gap:10px;flex-wrap:wrap;align-items:center;margin-top:10px}.ctrl{border:0;border-radius:10px;padding:10px 14px;font-weight:700}
.primary{background:#3b82f6;color:#fff}.secondary{background:#334155;color:#fff}.score{margin-left:auto;font-weight:700}
.card{background:#111827;border:1px solid #334155;border-radius:14px;padding:16px;margin:15px 0}.qnum{color:#60a5fa;font-weight:700;font-size:.85rem}
.question{font-size:1.05rem;line-height:1.45;margin:9px 0 12px}.choice{display:block;width:100%;text-align:left;background:#1f2937;color:#fff;border:1px solid #475569;border-radius:10px;padding:12px;margin:8px 0}
.choice.selected{outline:2px solid #3b82f6}.choice.correct{background:#14532d}.choice.wrong{background:#7f1d1d}
#result{display:none;background:#172554;border:1px solid #1d4ed8;border-radius:12px;padding:14px;margin-top:16px;font-weight:700}
@media(max-width:600px){.score{width:100%;margin-left:0}}
</style></head><body>
<header><div class="wrap"><h1>Exchange 2010 Final Review</h1><div class="meta">50 questions</div>
<div class="controls"><button class="ctrl primary" id="gradeBtn">Grade Quiz</button><button class="ctrl secondary" id="resetBtn">Retake</button>
<label><input id="study" type="checkbox"> Study mode</label><span class="score" id="score">Score: —</span></div></div></header>
<main class="wrap"><div id="result"></div><div id="quiz"></div></main>
<script>
const Q=[{"q": "What is the easiest and least disruptive scenario for integrating an Exchange Server based messaging system?", "options": ["coexistence", "upgrade", "greenfield deployment", "migration"], "answer": 1}, {"q": "What is used to express the percentage of time that service is available for use?", "options": ["availability", "recoverability", "reliability", "scalability"], "answer": 0}, {"q": "Incoming messages are directed to an Edge Transport Server based on ____ records and DNS.", "options": ["MX", "A", "PTR", "SRV"], "answer": 0}, {"q": "What is the information protection technology that works with applications to help safeguard digital information from unauthorized use?", "options": ["Active Directory Federation Services AD FS", "BitLocker Drive Encryption", "Active Directory Rights Management Services AD RMS", "Encrypting File System EFS"], "answer": 2}, {"q": "To manage mailbox database replication and activation, Exchange 2010 includes a new component which runs as a function of the Microsoft Exchange Replication Service, this new component is the ____.", "options": ["Client Access Array", "Transport Service", "Active Manager", "Mailbox Replication Service"], "answer": 2}, {"q": "When backing up Exchange 2010 Server Roles, which role requires backup data for system state of server and AD DS Domain Controllers, including the local configuration data of the machine?", "options": ["Client Access Role only", "Mailbox Role only", "Edge Transport Role only", "All Roles"], "answer": 3}, {"q": "All the data in the backup is internally consistent and it reflects the volume state at ____.", "options": ["Single point in time", "The end of the backup window", "The last logon", "Multiple recovery points"], "answer": 0}, {"q": "What feature in Exchange 2010 enables System Admin to restore a database overriding the existing database with a restored copy of the database?", "options": ["Database restore", "Database portability", "Recovery database", "Dial tone recovery"], "answer": 0}, {"q": "The recovery database is a recovered database that can coexist on the same server that hosts the original database ____ cannot access it directly?", "options": ["Standard, least privilege, or Users/Clients (Same thing)", "Exchange Trusted Subsystem", "Administrators", "Backup Operators"], "answer": 0}, {"q": "What is the process of implementing user access to email services without first restoring data to user mailboxes?", "options": ["Shadow redundancy", "Database portability", "Dial tone", "Log replay"], "answer": 2}, {"q": "What process can be used as a part of the mailbox server recovery strategy that involves keeping recovery servers available with the OS and other software installed reducing the time system administrators need to rebuild the database server?", "options": ["Use a recovery database", "Use a transport dumpster", "Use a standby server", "Use a shadow copy"], "answer": 2}, {"q": "When configuring transport rule, which component indicates which email message attributes header, recipient, senders, or other parts of the message exchange server use to identify the email messages to which it applies a transport rule action?", "options": ["Condition", "Action", "Exception", "Predicate result"], "answer": 0}, {"q": "When using either Exchange 2007 or 2010 what can be used to perform action that create new objects such as new mailboxes or new offline address books?", "options": ["Active Directory Users and Computers only", "Windows Server Backup", "IIS Manager only", "EMS/EMC (Exchange Management Shell or Console), also cmdlets"], "answer": 3}, {"q": "What AD RMS interpretation grants permission for the journaling agent to attach a decrypted copy of a rights protected message to the journal report?", "options": ["Enable journal report decryption", "Enable RMS super users", "Enable journal report description", "Enable transport decryption"], "answer": 2}, {"q": "In moderated transport, what submits any approved messages to the submission queue for delivery to the intended recipient or deletes rejected messages?", "options": ["Information assistant", "Moderation assistant", "Mailbox assistant", "Transport agent"], "answer": 0}, {"q": "Legal hold is enabled on a ____ and is virtually transparent to the end user because retention policies continue to operate.", "options": ["server", "database", "distribution group", "mailbox (individual)"], "answer": 3}, {"q": "Rather than depending on redundant disk arrays and backup to provide high availability, what can system administrators use to provide the required level of availability?", "options": ["NLB clusters", "RAID 0", "DAGs", "Public folders"], "answer": 2}, {"q": "____ refers to in Exchange 2010 to configure policy tags that set different rules about how long messages will be retained.", "options": ["Retention policies", "Transport rules", "Address book policies", "Journaling policies"], "answer": 0}, {"q": "____ assignment is an advanced method for assigning management roles directly to a user or universal security group without the need to use a role group or role assignment policy", "options": ["Exclusive role", "Delegating role", "Implicit role", "Direct role"], "answer": 3}, {"q": "What RBAC option assigns permission to administrators that may require permission to manage the Exchange Server organization or some parts of it.", "options": ["Role assignment policy", "Direct role assignment", "Management role group", "Management scope"], "answer": 2}, {"q": "Which assignment policy is an object in Exchange 2010 where users are associated with a Role Assignment Policy when system admins who create their mailboxes or change the role assignment policy on their mailbox?", "options": ["Management Role Group", "Management Role Assignment Policy", "Address Book Policy", "Retention Policy"], "answer": 1}, {"q": "What is one or more IP Address assigned to the DAG that can be configured by using static IP address, or through the use of DHCP Server to get an IP address automatically?", "options": ["Database availability group IP address", "Replication network IP address", "Witness server IP address", "Client Access array IP address"], "answer": 0}, {"q": "What is used to reduce the reliance on the state of the transport server , transport server queues, on redundant message path can exist if transport server fails, system administrator can simply remove it from production without worrying about emptying its queue or losing messages currently in transit?", "options": ["Transport dumpster", "Database replication", "Shadow redundancy", "Safety Net"], "answer": 2}, {"q": "When recovering the primary site of the DAG, what do Sys Admins need to perform upon completion to go back to the primary site?", "options": ["Rebuild the DAG", "Perform a failover", "Reseed all databases", "Perform a switchback with site resilience"], "answer": 3}, {"q": "What type of files contains personal information used by Exchange including email folders, contacts, address and other data?", "options": [".ost", ".log", ".edb", ".pst"], "answer": 3}, {"q": "What is an organization of critical decisions when planning a mailbox database deployment?", "options": ["DAG", "Retention policy", "Hub site", "CAS array"], "answer": 0}, {"q": "In a performance monitor, which counter shows that data must be read from disk instead of memory indicating there is not enough memory and paging is beginning?", "options": ["Disk Transfers / Second", "Processor Time", "Pages Read / Second", "Available MBytes"], "answer": 2}, {"q": "Which version of Exchange 2010 has updated roll ups for release to the manufacturer?", "options": ["Exchange Server 2010 Service Pack 0", "Exchange Server 2010 Service Pack 1", "Exchange Server 2010 Service Pack 2", "Exchange Server 2010 Service Pack 3"], "answer": 0}, {"q": "When installing the update rollups, which order should System Admin use to finalize the update?", "options": ["The latest update rollup", "The oldest update rollup first", "Every rollup in sequence", "Only the original RTM files"], "answer": 0}, {"q": "What is the first step to common troubleshooting methodology?", "options": ["Document the findings", "Test the solution", "Identify the problem?", "Establish a theory"], "answer": 2}, {"q": "What troubleshooting tool enables sys admin to identify potential issues based on deviations from best practices and for gathering a ? view of information about exchange server organization that sys admins can use for reference and for troubleshooting problems?", "options": ["Exchange Best Practices Analyzer", "Event Viewer", "Exchange Queue Viewer", "Performance Monitor"], "answer": 0}, {"q": "Which tool is recommended to run prior to any Exchange 2010 upgrade to check the messaging environment?", "options": ["Exchange Deployment Assistant", "Exchange Best Practices Analyzer", "Remote Connectivity Analyzer", "Exchange Management Console"], "answer": 1}, {"q": "Which MMC tool is used to configure Outlook Web App settings?", "options": ["eventvwr.msc", "IIS.msc", "services.msc", "compmgmt.msc"], "answer": 1}, {"q": "How would sys admin upgrade form a non exchange server messaging system to Exchange 2010 or from an existing Exchange Server organization to a new Exchange Server Org without retaining any existing organization Exchange Configuration data?", "options": ["Upgrade", "Migration", "Transition", "Coexistence"], "answer": 1}, {"q": "What upgrade tool is a web-based tool that can help SysAdmin deploy Exchange 2010 in the existing environment with the use of a Wizard?", "options": ["Exchange Best Practices Analyzer", "Exchange Deployment Assistant", "Exchange Troubleshooting Assistant", "Exchange Control Panel"], "answer": 1}, {"q": "What split permission will remove the permission for the Exchange Server to create security principles in Active Directory Domain Services preventing anyone from using the Exchange Mgmt Tools to create AD DS security principles?", "options": ["RBAC delegation", "AD split permissions", "Least privilege mode", "Exchange split permissions"], "answer": 1}, {"q": "What is used to capture data about changes made to the organization by users and admins?", "options": ["Mailbox Audit Logging", "Message Tracking Logging", "Protocol Logging", "Administrator Audit Logging"], "answer": 3}, {"q": "What can be used if SysAdmin enables remote access to your Exchange Server Org to prevent attackers from outside the Org from compromising user accounts?", "options": ["Journaling policy", "Policy we put up?? Group Policy Password?", "Transport rule", "Address book policy"], "answer": 1}, {"q": "What is the first item that needs to be done to support external client coexistence with Exchange Server 2010, CAS, and Legacy Exchange Servers to ensure access?", "options": ["Obtain required server certificates", "Configure DAG replication", "Enable circular logging", "Create a recovery database"], "answer": 0}, {"q": "The most important change during an upgrade is that all client connectivity including Outlook MAPI connectivity now goes through the ___ server role.", "options": ["Client Access", "Edge Transport", "Mailbox", "Hub Transport"], "answer": 0}, {"q": "Message transport coexistence is configured ____ as long as the correct version of the Hub Transport Servers are available.", "options": ["Automatically", "Manually", "Only through PowerShell", "Only after database failover"], "answer": 0}, {"q": "What is the alternative to the standard firewall that is used to restrict or enable access to the internal Exchange Server?", "options": ["Transport rule configuration", "DAG configuration", "Reverse proxy configuration", "Mailbox policy"], "answer": 2}, {"q": "By default, all CAS are configured with ____ certificates during Exchange 2010 installation?", "options": ["Public CA", "Enterprise CA", "Self-signed", "Wildcard"], "answer": 2}, {"q": "When using a reverse proxy server, what feature can distribute the traffic that is destined for a single URL to a group of servers?", "options": ["Failover clustering", "Shadow redundancy", "Load-balancing", "Round robin DNS only"], "answer": 2}, {"q": "What Exchange Server feature enables SysAdmin to save copies of all email messages in a collection mailbox when they are sent to or from specified mailboxes, contacts, or distribution group members?", "options": ["Archiving", "Retention", "Journaling", "Message tracking"], "answer": 2}, {"q": "When a problem arises, what can SysAdmin do to pinpoint and repair them without relying on users to report the problems?", "options": ["Create a recovery database", "Enable journaling", "Identify a performance issue", "Reset all mailboxes"], "answer": 2}, {"q": "Monitor the Exchange Server environment is important for following reasons:", "options": ["Changing email addresses", "Creating new mailboxes", "Configuring public folders", "Identifying security issues and DOS attacks"], "answer": 3}, {"q": "The transport server only holds email that have been delivered so where is the pending email held at?", "options": ["Unreachable queue", "Mailbox database", "Transport dumpster", "Local submission queue"], "answer": 3}, {"q": "What is the ideal percentage of processor time while it is executing processes?", "options": ["Less than 25%", "Exactly 50%", "More than 90%", "Less than 75%"], "answer": 3}, {"q": "What type of files contain personal information used by Exchange including email folders, contacts, addresses and other data?", "options": [".pst", ".ost", ".edb", ".xml"], "answer": 0}]; let S=[];
function esc(s){return s.replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#039;'}[m]));}
function resetQuiz(){S=Q.map(()=>({selected:null,revealed:false}));score.textContent='Score: —';result.style.display='none';render();}
function render(){quiz.innerHTML='';Q.forEach((q,qi)=>{const c=document.createElement('section');c.className='card';c.innerHTML=`<div class="qnum">Question ${qi+1}</div><div class="question">${esc(q.q)}</div>`;q.options.forEach((o,oi)=>{const b=document.createElement('button');b.className='choice';b.textContent=String.fromCharCode(65+oi)+'. '+o;if(S[qi].selected===oi)b.classList.add('selected');if(S[qi].revealed){if(oi===q.answer)b.classList.add('correct');else if(S[qi].selected===oi)b.classList.add('wrong');}b.onclick=()=>{S[qi].selected=oi;if(study.checked)S[qi].revealed=true;render();};c.appendChild(b);});quiz.appendChild(c);});}
function gradeQuiz(){let n=0;S.forEach((s,i)=>{if(s.selected===Q[i].answer)n++;s.revealed=true;});const p=Math.round(n/Q.length*100);score.textContent=`Score: ${n}/${Q.length} (${p}%)`;result.textContent=`You answered ${n} of ${Q.length} correctly.`;result.style.display='block';render();scrollTo({top:0,behavior:'smooth'});}
gradeBtn.onclick=gradeQuiz;resetBtn.onclick=resetQuiz;study.onchange=()=>{S.forEach(x=>x.revealed=false);score.textContent='Score: —';result.style.display='none';render();};resetQuiz();
</script></body></html>
