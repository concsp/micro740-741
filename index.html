<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>70-742 Final Review Quiz</title>
<style>
:root{--bg:#0f172a;--card:#111827;--muted:#94a3b8;--text:#e5e7eb;--accent:#38bdf8;--good:#16a34a;--bad:#dc2626;--border:#334155;}
*{box-sizing:border-box} body{margin:0;font-family:system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif;background:linear-gradient(180deg,#0f172a,#020617);color:var(--text);}
header{position:sticky;top:0;z-index:10;background:rgba(15,23,42,.95);border-bottom:1px solid var(--border);padding:14px 16px;backdrop-filter:blur(8px)}
.wrap{max-width:1000px;margin:0 auto;padding:18px 14px 80px}.top{display:flex;gap:12px;align-items:center;justify-content:space-between;flex-wrap:wrap}.title h1{font-size:1.25rem;margin:0}.title p{margin:3px 0 0;color:var(--muted);font-size:.9rem}.controls{display:flex;gap:8px;flex-wrap:wrap;align-items:center}
button{background:#1e293b;color:var(--text);border:1px solid var(--border);border-radius:10px;padding:10px 12px;font-weight:650;cursor:pointer}button:hover{border-color:var(--accent)}button.primary{background:var(--accent);color:#00111a;border-color:var(--accent)}button.danger{background:#3b1111;border-color:#7f1d1d}.pill{border:1px solid var(--border);border-radius:999px;padding:8px 10px;color:var(--muted);font-size:.9rem}.score{font-weight:800;color:#fff}.card{background:rgba(17,24,39,.88);border:1px solid var(--border);border-radius:16px;padding:16px;margin:14px 0;box-shadow:0 10px 24px rgba(0,0,0,.16)}.qhead{display:flex;gap:10px;align-items:flex-start}.num{min-width:34px;height:34px;display:grid;place-items:center;border-radius:10px;background:#1e293b;color:#bae6fd;font-weight:800}.qtext{font-weight:750;line-height:1.35}.hint{font-size:.85rem;color:var(--muted);margin-top:5px}.answers{display:grid;gap:9px;margin-top:13px}.answer{width:100%;text-align:left;background:#0b1220;border:1px solid var(--border);border-radius:12px;padding:11px 12px;font-weight:550;line-height:1.3}.answer.selected{border-color:var(--accent);box-shadow:0 0 0 2px rgba(56,189,248,.16)}.answer.correct{background:rgba(22,163,74,.18);border-color:var(--good);color:#dcfce7}.answer.wrong{background:rgba(220,38,38,.18);border-color:var(--bad);color:#fee2e2}.explain{display:none;margin-top:10px;color:#cbd5e1;font-size:.92rem}.show{display:block}.footerbar{position:fixed;left:0;right:0;bottom:0;background:rgba(2,6,23,.96);border-top:1px solid var(--border);padding:10px 14px}.footerinner{max-width:1000px;margin:0 auto;display:flex;justify-content:space-between;gap:8px;align-items:center;flex-wrap:wrap}.toggle{display:flex;align-items:center;gap:8px;color:var(--muted);font-weight:650}input[type=checkbox]{width:18px;height:18px}.summary{white-space:pre-wrap}.small{font-size:.85rem;color:var(--muted)}
</style>
</head>
<body>
<header><div class="top wrap" style="padding-top:0;padding-bottom:0"><div class="title"><h1>70-742 Final Review Quiz</h1><p>50-question Active Directory review quiz. Study mode reveals per-question after clicking.</p></div><div class="controls"><span class="pill">Answered: <span id="answered">0</span>/<span id="total">0</span></span><span class="pill">Score: <span class="score" id="score">—</span></span><button id="shuffleBtn">Shuffle Questions</button><button class="danger" id="resetBtn">Reset</button></div></div></header>
<main class="wrap"><div class="card"><strong>Mode:</strong> In normal mode, answer everything then grade. In study mode, each answer checks immediately, but only for that question.</div><div id="quiz"></div><div id="summary" class="card summary" style="display:none"></div></main>
<div class="footerbar"><div class="footerinner"><label class="toggle"><input type="checkbox" id="studyMode"> Study mode</label><div class="controls"><button class="primary" id="gradeBtn">Grade Quiz</button></div></div></div>
<script>
const RAW_QUESTIONS = [{"q": "To help you organize registry settings, what can you use?", "correct": ["Collections"], "wrong": ["Security templates", "Certificate templates", "Claims provider trusts"]}, {"q": "Which security template allows you to specify users who are allowed to be added to a specific group?", "correct": ["Restricted Groups"], "wrong": ["Local Policies", "Audit Policy", "User Rights Assignment"]}, {"q": "What are the three states of configuring administrative templates?", "correct": ["Not Configured / Enabled / Disabled"], "wrong": ["Allowed / Denied / Inherited", "Started / Stopped / Paused", "Published / Assigned / Removed"]}, {"q": "You can use all of the following to scope a GPO except:", "correct": ["Administrative Templates"], "wrong": ["Security filtering", "WMI filters", "Organizational Unit links"]}, {"q": "Windows Server 2016 provides all of the following tools for RSoP except:", "correct": ["Group Policy PowerShell"], "wrong": ["Group Policy Results Wizard", "GPResult.exe", "Group Policy Modeling Wizard"]}, {"q": "What tool should you use to verify that the certificate is stored in the correct location?", "correct": ["Certificate MMC"], "wrong": ["ADSI Edit", "Group Policy Management Console", "Server Manager Dashboard"]}, {"q": "What version of Certificate Templates was introduced with Windows Server 2008?", "correct": ["Version 3"], "wrong": ["Version 1", "Version 2", "Version 4"]}, {"q": "To configure certificate template permissions, what would you need to define on each certificate?", "correct": ["Discretionary access control list (DACL)"], "wrong": ["Service principal name (SPN)", "Security identifier (SID)", "Certificate revocation list (CRL)"]}, {"q": "The autoenroll permission requires the user or computer to have what permissions for the certificate template?", "correct": ["Read and Enroll permissions"], "wrong": ["Full Control and Write permissions", "Read and Execute permissions", "Enroll and Manage CA permissions"]}, {"q": "What path should you navigate to if you want to install a computer certificate?", "correct": ["Computer Configuration \\ Policies \\ Windows Settings \\ Security Settings \\ Public Key Policies"], "wrong": ["User Configuration \\ Policies \\ Administrative Templates \\ System", "Computer Configuration \\ Preferences \\ Control Panel Settings \\ Certificates", "Server Manager \\ Tools \\ Certification Authority \\ Issued Certificates"]}, {"q": "What term or setting describes establishing an identity federation partnership where both partners must agree to create it?", "correct": ["Trust relationship"], "wrong": ["Claim rule", "Relying party identifier", "Certificate chain"]}, {"q": "What are the components of ADFS (Active Directory Federation Services)?", "correct": ["Federation Server / Web Application Proxy / Claims Provider Trust / Claim Rules"], "wrong": ["Domain Controller / Global Catalog / RID Master / Schema Master", "CA Server / Online Responder / CRL / AIA", "AD RMS Server / Licensing Cluster / Rights Policy Template / SCP"]}, {"q": "Which type of relational database attribute store does ADFS support?", "correct": ["Microsoft SQL Server 2008 and later"], "wrong": ["Microsoft Access 2010 and later", "Windows Internal Database only", "SQLite 3 and later"]}, {"q": "Windows Server 2016 AD FS only includes the Federation Service. If you need a reverse proxy, what must you install?", "correct": ["Install the Remote Access role and specifically add Web Application Proxy role services"], "wrong": ["Install the DHCP Server role and add relay agent services", "Install AD DS and promote the server to a domain controller", "Install File and Storage Services and add BranchCache"]}, {"q": "What term or setting allows administrators to manage certificates within ADFS?", "correct": ["Windows PowerShell is one of the tools"], "wrong": ["DHCP console is one of the tools", "Disk Management is one of the tools", "Windows Defender is one of the tools"]}, {"q": "By default, which users are given the Apply Group Policy permissions?", "correct": ["Authenticated Users"], "wrong": ["Domain Admins", "Enterprise Admins", "Schema Admins"]}, {"q": "What term or setting allows administrators to configure SSO for web-based applications across a single or multiple organizations?", "correct": ["ADFS (Active Directory Federation Services)"], "wrong": ["AD RMS (Active Directory Rights Management Services)", "AD CS (Active Directory Certificate Services)", "AD LDS (Active Directory Lightweight Directory Services)"]}, {"q": "Which trust type identifies the claims provider and describes how the relying party consumes the claims?", "correct": ["Claims Provider Trust (CPT)"], "wrong": ["Forest Trust", "External Trust", "Shortcut Trust"]}, {"q": "WMI filters will only be applied to computers running which versions of Windows?", "correct": ["Windows 2003 and later"], "wrong": ["Windows 2000 and later", "Windows Server 2008 R2 and later only", "Windows Server 2016 only"]}, {"q": "What steps should an administrator take to verify that the client and servers can communicate with the necessary computers prior to implementing ADFS?", "correct": ["All of the above"], "wrong": ["Only verify that the client can communicate with the web app", "Only verify that the federation server can communicate with DNS", "Only verify that the web application proxy can communicate with DHCP"]}, {"q": "How often are security settings reapplied even if there are no GPO changes?", "correct": ["Every 16 hours"], "wrong": ["Every 30 minutes", "Every 90 minutes", "Every 24 hours"]}, {"q": "Which command can you use to manually refresh a group policy?", "correct": ["gpupdate"], "wrong": ["gpresult", "dcgpofix", "secedit"]}, {"q": "All of the following can result in unexpected changes except:", "correct": ["Running the Group Policy Results Wizard"], "wrong": ["Changing GPO link order", "Changing security filtering", "Blocking inheritance"]}, {"q": "What is another way to modify the setting for offline files for your organization?", "correct": ["Group Policies"], "wrong": ["Disk Management", "DNS Manager", "Device Manager"]}, {"q": "How do you manage security templates?", "correct": ["Security Templates Snap-In"], "wrong": ["Certificate Templates Snap-In", "DNS Manager Snap-In", "AD RMS Snap-In"]}, {"q": "Which tools can you use to view your service connection point?", "correct": ["ADSI Edit (adsiedit.msc) / LDP (ldp.exe)"], "wrong": ["DNS Manager / DHCP Manager", "Event Viewer / Task Scheduler", "DiskPart / Disk Management"]}, {"q": "What groups must you be a member of to register the SCP (Service Connection Point)?", "correct": ["Active Directory Register Management Server (ADRMS) Enterprise Administrator AND Active Directory Enterprise Administrator"], "wrong": ["Domain Users AND Backup Operators", "DHCP Administrators AND DNS Administrators", "Certificate Managers AND Print Operators"]}, {"q": "Active Directory clients automatically get the SCP from Active Directory. What must you do if your client computer is not part of the Active Directory forest?", "correct": ["Use your registry keys to point to the AD RMS cluster"], "wrong": ["Create a DHCP reservation for the client", "Disable the local firewall permanently", "Join the computer to a workgroup named RMS"]}, {"q": "What needs to be added on the administrative template to create a GPO?", "correct": ["Central Store"], "wrong": ["Global Catalog", "Starter Trust", "Certificate Store"]}, {"q": "What term specifies what a user or group can do to an object?", "correct": ["Permissions"], "wrong": ["Claims", "Templates", "Collections"]}, {"q": "Only one SCP for AD RMS can exist in your AD forest. SCP is what is used for AD RMS?", "correct": ["Service Connection Point"], "wrong": ["Secure Certificate Provider", "System Configuration Policy", "Server Claim Path"]}, {"q": "What are some of the setting options you have with administrative template property filters?", "correct": ["Computer Filter / Managed and Unmanaged Settings / Configured or Not Configured"], "wrong": ["Audit Filter / Domain and Forest Settings / Enabled Only", "Certificate Filter / User Rights / Denied Only", "DNS Filter / Reverse Lookup Settings / Cached or Not Cached"]}, {"q": "Which filter option needs to be enabled in order to allow you to run a certain operating system or other components such as a certain version of Internet Explorer?", "correct": ["Enable Requirements filter"], "wrong": ["Enable Security filter", "Enable Scope filter", "Enable Loopback filter"]}, {"q": "Group Policy preferences can be configured on domain controllers using what OS?", "correct": ["Windows Server 2008"], "wrong": ["Windows Server 2003 only", "Windows Server 2012 R2 only", "Windows Server 2016 only"]}, {"q": "When toggling the editing state for GPO, which key will enable the current settings?", "correct": ["F6"], "wrong": ["F5", "F7", "F8"]}, {"q": "What role services of ADCS (Active Directory Certificate Services) are available?", "correct": ["CA (Certificate Authority) / CA Web Enrollment / Online Responder / Network Device Enrollment Service"], "wrong": ["Federation Server / Web Application Proxy / Claims Provider Trust / Claim Rules", "AD RMS Server / AD RMS Client / Licensing Only Cluster", "DNS Server / DHCP Server / WINS Server / IPAM Server"]}, {"q": "What are the best practices of CA (Certificate Authority) security?", "correct": ["Access to the CA should be limited to the PKI Hierarchy / The Root CA should be taken offline and stored in a secure location with an established chain of custody"], "wrong": ["Allow all domain users to manage the CA / Keep the Root CA online for convenience", "Store the Root CA on every client / Disable certificate revocation checking", "Use anonymous access to simplify enrollment / Publish private keys to AD"]}, {"q": "After a CA is installed, you must configure the CRL distribution point (CDP) extension and what else before the CA issues any certificates?", "correct": ["AIA (Authority Information Access)"], "wrong": ["SCP (Service Connection Point)", "GPP (Group Policy Preferences)", "SID (Security Identifier)"]}, {"q": "Which CRLs contain only the certificates revoked since the last regular CRL was published?", "correct": ["Delta CRLs"], "wrong": ["Base CRLs", "Root CRLs", "Full CRLs"]}, {"q": "What implements OCSP and allows a recipient of a certificate to submit a request using HTTP?", "correct": ["Online Responder"], "wrong": ["Certificate Templates MMC", "Web Application Proxy", "Group Policy Results Wizard"]}, {"q": "Administrators can install Online Responders on which Windows Server platform?", "correct": ["Windows Server 2008 Enterprise / Windows Server 2016"], "wrong": ["Windows Server 2003 Web Edition only", "Windows Server 2012 Essentials only", "Windows 10 Enterprise only"]}, {"q": "Certificate Chain is also known as what?", "correct": ["Certificate Path"], "wrong": ["Certificate Store", "Certificate Template", "Certificate Request"]}, {"q": "When viewing a digital certificate, all of the following tabs would be included with the exception of:", "correct": ["Login / Control / Testing / Materials"], "wrong": ["General", "Details", "Certification Path"]}, {"q": "Which AD RMS template allows content to be viewed using a browser add-on without the AD RMS knowing?", "correct": ["Enable users to view protected content using a browser add-on"], "wrong": ["Require a new-use license each time content is consumed", "Disable client-side caching", "Create archived rights account certificates"]}, {"q": "Which components make up the AD RMS infrastructure?", "correct": ["AD RMS Server / AD RMS Client / Licensing Only Cluster"], "wrong": ["Federation Server / Web Application Proxy / Claims Provider Trust", "CA / CA Web Enrollment / Online Responder", "DNS Server / DHCP Server / IPAM Server"]}, {"q": "Which certificate is issued to users who are accessing AD RMS protected content from a computer that is NOT a member of the same trusted forest?", "correct": ["Temporary Rights Account Certificate (Temporary RAC)"], "wrong": ["Machine Certificate", "Key Recovery Agent Certificate", "Enrollment Agent Certificate"]}, {"q": "What AD object holds the web address of the AD RMS cluster?", "correct": ["Service Connection Point (SCP)"], "wrong": ["Claims Provider Trust (CPT)", "Certificate Revocation List (CRL)", "Discretionary Access Control List (DACL)"]}, {"q": "Which template is used to enforce the right that a user or group has on rights protected content?", "correct": ["Rights Policy Template"], "wrong": ["Administrative Template", "Security Template", "Certificate Template"]}, {"q": "Which AD RMS template disables client-side caching, meaning that the document cannot be accessed when the computer is offline?", "correct": ["Require a new-use license each time content is consumed"], "wrong": ["Enable users to view protected content using a browser add-on", "Allow offline publishing by default", "Create a licensing-only cluster"]}];
let questions=[];let selected={};let checked={};let graded=false;
function shuffle(arr){const a=[...arr];for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}return a;}
function prep(){questions=RAW_QUESTIONS.map((q,idx)=>({id:idx+1,q:q.q,answers:shuffle([...q.correct.map(t=>({text:t,correct:true})),...q.wrong.map(t=>({text:t,correct:false}))]),multi:(q.correct.length>1)}));}
function render(){document.getElementById('total').textContent=questions.length;const quiz=document.getElementById('quiz');quiz.innerHTML='';const study=document.getElementById('studyMode').checked;questions.forEach((q,i)=>{const card=document.createElement('section');card.className='card';const chosen=selected[q.id]||[];const isChecked=graded||checked[q.id];card.innerHTML=`<div class="qhead"><div class="num">${i+1}</div><div><div class="qtext">${escapeHtml(q.q)}</div>${q.multi?'<div class="hint">Choose all that apply.</div>':''}</div></div><div class="answers"></div><div class="explain ${isChecked?'show':''}">${isChecked?feedback(q):''}</div>`;const answers=card.querySelector('.answers');q.answers.forEach((a,ai)=>{const btn=document.createElement('button');btn.className='answer';btn.innerHTML=`<span class="small">${String.fromCharCode(65+ai)}.</span> ${escapeHtml(a.text)}`;const chosenThis=chosen.includes(ai);if(chosenThis) btn.classList.add('selected');if(isChecked){if(a.correct) btn.classList.add('correct');else if(chosenThis&&!a.correct) btn.classList.add('wrong');}
btn.onclick=()=>selectAnswer(q,ai);answers.appendChild(btn);});quiz.appendChild(card);});updateStats();}
function selectAnswer(q,ai){if(graded) return; if(q.multi){const arr=selected[q.id]?[...selected[q.id]]:[];const pos=arr.indexOf(ai); if(pos>=0) arr.splice(pos,1); else arr.push(ai); selected[q.id]=arr;} else {selected[q.id]=[ai];}
if(document.getElementById('studyMode').checked){checked[q.id]=true;} render();}
function isCorrect(q){const chosen=(selected[q.id]||[]).slice().sort((a,b)=>a-b);const corr=q.answers.map((a,i)=>a.correct?i:null).filter(x=>x!==null).sort((a,b)=>a-b);return chosen.length===corr.length&&chosen.every((v,i)=>v===corr[i]);}
function feedback(q){return isCorrect(q)?'Correct.':'Incorrect. Correct answer: '+q.answers.filter(a=>a.correct).map(a=>a.text).join('; ');}
function grade(){graded=true;Object.keys(Object.fromEntries(questions.map(q=>[q.id,1]))).forEach(id=>checked[id]=true);render();const correct=questions.filter(isCorrect).length;const pct=Math.round(correct/questions.length*100);const s=document.getElementById('summary');s.style.display='block';s.textContent=`Final Score: ${correct}/${questions.length} (${pct}%)`;document.getElementById('score').textContent=`${correct}/${questions.length}`;window.scrollTo({top:0,behavior:'smooth'});}
function reset(){selected={};checked={};graded=false;document.getElementById('score').textContent='—';document.getElementById('summary').style.display='none';prep();render();}
function updateStats(){document.getElementById('answered').textContent=Object.values(selected).filter(a=>a&&a.length).length;if(!graded)document.getElementById('score').textContent='—';}
function escapeHtml(str){return String(str).replace(/[&<>'"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;',"'":'&#39;','"':'&quot;'}[c]));}
document.getElementById('gradeBtn').onclick=grade;document.getElementById('resetBtn').onclick=reset;document.getElementById('shuffleBtn').onclick=()=>{questions=shuffle(questions);render();};document.getElementById('studyMode').onchange=()=>{render();};prep();render();
</script>
</body></html>
